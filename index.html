/* ═══ AUTO-DETECT SEASON from date ═══ */
function autoDetectSeason(){
  const m=new Date().getMonth();
  if(m>=2&&m<=4) return "spring";
  if(m>=5&&m<=7) return "summer";
  if(m>=8&&m<=10) return "autumn";
  return "winter";
}

/* ═══ WEATHER → CONDITION mapping ═══ */
function mapWeatherToCondition(data){
  try{
    const cur=data.current_condition[0];
    const temp=parseFloat(cur.temp_C);
    const wind=parseFloat(cur.windspeedKmph);
    const code=parseInt(cur.weatherCode);
    const rainCodes=[176,263,266,293,296,299,302,305,308,311,314,317,320,323,326,329,332,335,338,350,353,356,359,362,365,368,371,374,377,386,389,392,395];
    if(rainCodes.includes(code)) return "rain";
    if(wind>30||temp<0) return "wind";
    if(temp>18) return "intense";
    return "mixed";
  }catch(e){return "mixed";}
}

/* ═══ SOCIAL PROOF (deterministic hash) ═══ */
function socialProof(id){
  let h=0;for(let i=0;i<id.length;i++){h=((h<<5)-h)+id.charCodeAt(i);h|=0;}
  const n=Math.abs(h%30)+70;
  const labels=["des randonneurs","des skieurs","des alpinistes","des traileurs","des experts outdoor"];
  return{pct:n,label:labels[Math.abs(h>>8)%labels.length]};
}

/* ═══ CONTEXTUAL WHY ═══ */
function getContextualWhy(product,actId,seaId,condId){
  const actMap={hiking:"en randonnée","ski-touring":"en ski de rando",alpine:"en alpinisme",trail:"en trail running",ski:"en ski alpin",everyday:"au quotidien"};
  const seaMap={spring:"printanier",summer:"estival",autumn:"automnal",winter:"hivernal"};
  const condMap={rain:"sous la pluie et la neige",wind:"face au vent et au froid",mixed:"en conditions changeantes",intense:"lors d'efforts intenses"};
  const ctx=(actMap[actId]||"en montagne")+" "+(seaMap[seaId]||"")+" "+(condMap[condId]||"");
  let cat="outer";
  for(const[k,arr] of Object.entries(P)){if(arr.some(p=>p.id===product.id)){cat=k;break;}}
  const pre={
    base:`Pour votre pratique ${ctx}, la régulation thermique est critique.`,
    mid:`${ctx.charAt(0).toUpperCase()+ctx.slice(1)}, l'isolation doit s'adapter à vos transitions effort/repos.`,
    outer:`${ctx.charAt(0).toUpperCase()+ctx.slice(1)}, votre couche externe est votre bouclier.`,
    pants:`${ctx.charAt(0).toUpperCase()+ctx.slice(1)}, vos jambes sont votre moteur.`,
  };
  return (pre[cat]||"")+" "+product.why;
}

/* ═══ SCORING ENGINE ═══
   sc vectors: [warmth, breathability, wind, rain, lightweight, versatility]

   1. Build ideal profile from activity + season + condition
   2. Level adjusts quality/price tolerance
   3. Warmth/breathability slider shifts the profile weights
   4. Budget slider filters candidates
   5. Score = weighted dot product, best per category wins
*/

/* Activity profiles — what matters most for each sport */
const ACT_PROFILES={
  hiking:     [4,7,5,5,7,8],
  "ski-touring":[7,9,8,6,6,4],
  alpine:     [8,6,9,9,5,3],
  trail:      [2,10,4,3,9,7],
  ski:        [8,5,7,8,4,6],
  everyday:   [5,6,5,4,6,10],
};
/* Season modifiers — added to profile */
const SEA_MOD={
  spring: [0,1,1,2,1,1],
  summer: [-3,3,0,-1,2,1],
  autumn: [1,1,2,2,0,0],
  winter: [4,0,3,2,-1,-1],
};
/* Condition modifiers */
const COND_MOD={
  rain:   [1,-1,2,5,0,-1],
  wind:   [2,-1,5,1,0,-1],
  mixed:  [0,0,1,1,1,2],
  intense:[-2,5,-1,-1,3,0],
};
/* Level: quality multiplier (higher = prefer premium) + price tolerance */
const LVL_MULT={beginner:{q:0.7,maxPrice:300},regular:{q:1.0,maxPrice:500},expert:{q:1.4,maxPrice:999}};

function buildProfile(act,sea,cond,warmBreathBias){
  const a=ACT_PROFILES[act]||ACT_PROFILES.hiking;
  const s=SEA_MOD[sea]||SEA_MOD.spring;
  const c=COND_MOD[cond]||COND_MOD.mixed;
  /* warmBreathBias: 0=full warmth, 100=full breathability (default 50=neutral) */
  const wb=(warmBreathBias-50)/50; /* -1 to +1 */
  const profile=a.map((v,i)=>v+s[i]+c[i]);
  /* Shift warmth (idx 0) and breathability (idx 1) based on slider */
  profile[0]+=(-wb*3); /* more warmth when slider left */
  profile[1]+=(wb*3);  /* more breathability when slider right */
  return profile;
}

function scoreProduct(product,profile,lvl){
  const q=LVL_MULT[lvl]?.q||1;
  const sc=product.sc;
  /* Weighted dot product + quality multiplier for premium products */
  let score=0;
  for(let i=0;i<6;i++){
    const diff=Math.abs(profile[i]-sc[i]);
    score+=(10-diff)*Math.max(0.5,profile[i]/5); /* weight by how important this axis is */
  }
  /* Expert bonus: prefer higher-spec products */
  if(q>1) score+=sc.reduce((a,b)=>a+b,0)*0.1*(q-1)*3;
  /* Beginner bonus: prefer versatile, affordable */
  if(q<1) score+=sc[5]*0.5+(10-product.price/100)*0.3;
  return score;
}

function getRecs(act,sea,cond,lvl,gen,budgetMax,warmBreath){
  const g=gen||"m";const c=cond||"mixed";const l=lvl||"regular";
  const bMax=budgetMax||800;const wb=warmBreath!=null?warmBreath:50;
  const profile=buildProfile(act,sea,c,wb);
  const cats=["base","mid","outer","pants"];
  const L=[{l:"COUCHE 1",n:"Base — Régulation",c:"base"},{l:"COUCHE 2",n:"Isolation — Chaleur",c:"mid"},{l:"COUCHE 3",n:"Protection — Éléments",c:"outer"},{l:"BAS",n:"Pantalon technique",c:"pants"}];

  const results=cats.map((cat,idx)=>{
    const candidates=P[cat]
      .map(p=>({...p,_score:scoreProduct(p,profile,l)}))
      .sort((a,b)=>b._score-a._score);
    /* Prefer within budget, but fallback to best score if all over budget */
    const inBudget=candidates.filter(p=>p.price<=bMax);
    const pick=inBudget.length>0?inBudget[0]:candidates[0];
    return{...pick,layerLabel:L[idx].l,layerName:L[idx].n,cat,dImg:g==="f"&&pick.imgF?pick.imgF:pick.img,_matchPct:Math.round(Math.min(100,pick._score*1.5))};
  });
  return results;
}

        {ph==="activity"&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(120px, 1fr))",gap:6,maxWidth:560}}>{ACTS.map((a,idx)=><div key={a.id} onClick={()=>{setAct(a.id);setPh("destination");}} style={{cursor:"pointer",position:"relative",overflow:"hidden",aspectRatio:"3/4",background:"#111",animation:"fadeUp 0.4s ease "+(idx*0.06)+"s both"}}><img src={a.img} alt={a.label} loading="lazy" style={{width:"100%",height:"100%",objectFit:"cover",filter:"brightness(0.5)",transition:"filter 0.3s"}} onMouseEnter={e=>e.target.style.filter="brightness(0.7)"} onMouseLeave={e=>e.target.style.filter="brightness(0.5)"}/><div style={{position:"absolute",inset:0,background:"linear-gradient(transparent 50%,rgba(0,0,0,0.85))",display:"flex",flexDirection:"column",justifyContent:"flex-end",padding:"10px 8px"}}><span style={{fontSize:22,marginBottom:2}}>{a.e}</span><span style={{fontFamily:T.bf,fontSize:"clamp(10px,1.5vw,12px)",fontWeight:600}}>{a.label}</span></div></div>)}</div>}

        {/* Destination */}
        {ph==="destination"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,maxWidth:500}}>{DESTS.map((d,idx)=><div key={d.id} onClick={()=>chooseDest(d)} style={{cursor:"pointer",position:"relative",overflow:"hidden",aspectRatio:"16/10",background:"#111",animation:"fadeUp 0.4s ease "+(idx*0.06)+"s both"}}><img src={d.img} alt={d.label} loading="lazy" style={{width:"100%",height:"100%",objectFit:"cover",filter:"brightness(0.4)",transition:"filter 0.3s"}} onMouseEnter={e=>e.target.style.filter="brightness(0.6)"} onMouseLeave={e=>e.target.style.filter="brightness(0.4)"}/><div style={{position:"absolute",inset:0,background:"linear-gradient(transparent 30%,rgba(0,0,0,0.85))",display:"flex",flexDirection:"column",justifyContent:"flex-end",padding:"10px"}}><span style={{fontSize:18}}>{d.e}</span><span style={{fontFamily:T.bf,fontSize:13,fontWeight:600}}>{d.label}</span><span style={{fontFamily:T.bf,fontSize:10,color:T.grey}}>{d.sub}</span></div></div>)}</div>}

        {/* Condition (only if "Autre" destination) */}
        {ph==="condition"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,maxWidth:420}}>{CONDS.map(c=><Btn key={c.id} label={c.label} emoji={c.e} sub={c.d} onClick={()=>{setCond(c.id);setPh("level");}}/>)}</div>}

        {/* Level — show detected weather if available */}
        {ph==="level"&&<>
          {wLoading&&<div style={{marginBottom:16,padding:"8px 12px",background:"rgba(122,170,148,0.06)",border:"1px solid rgba(122,170,148,0.1)",display:"flex",alignItems:"center",gap:8,animation:"fadeIn 0.3s"}}><div style={{width:6,height:6,borderRadius:"50%",background:T.acc2,animation:"pulse 1s infinite"}}/><span style={{fontFamily:T.bf,fontSize:10,color:T.grey}}>Détection météo {dObj?.label||""}...</span></div>}
          {!wLoading&&wCity&&<div style={{marginBottom:16,padding:"8px 12px",background:"rgba(122,170,148,0.06)",border:"1px solid rgba(122,170,148,0.1)",display:"flex",alignItems:"center",gap:8,animation:"fadeIn 0.3s"}}><span style={{fontSize:12}}>📍</span><span style={{fontFamily:T.bf,fontSize:11,color:T.light}}>{dObj?.e} {wCity} · {wTemp}°C · {wDesc}</span><span style={{fontFamily:T.bf,fontSize:9,color:T.acc2,marginLeft:"auto"}}>{cObj?.e} {cObj?.label}</span></div>}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,maxWidth:560}}>{LVLS.map((l,idx)=><div key={l.id} onClick={()=>doLvl(l.id)} style={{cursor:"pointer",position:"relative",overflow:"hidden",aspectRatio:"3/4",background:"#111",animation:"fadeUp 0.4s ease "+(idx*0.06)+"s both"}}><img src={l.img} alt={l.label} loading="lazy" style={{width:"100%",height:"100%",objectFit:"cover",filter:"brightness(0.4)",transition:"filter 0.3s"}} onMouseEnter={e=>e.target.style.filter="brightness(0.6)"} onMouseLeave={e=>e.target.style.filter="brightness(0.4)"}/><div style={{position:"absolute",inset:0,background:"linear-gradient(transparent 40%,rgba(0,0,0,0.85))",display:"flex",flexDirection:"column",justifyContent:"flex-end",padding:"10px 8px"}}><span style={{fontSize:22,marginBottom:2}}>{l.e}</span><span style={{fontFamily:T.bf,fontSize:"clamp(11px,1.5vw,13px)",fontWeight:600}}>{l.label}</span><span style={{fontFamily:T.bf,fontSize:10,color:T.grey,marginTop:2}}>{l.d}</span></div></div>)}</div>
        </>}
      </div>}

      {/* ANALYZING */}
      {ph==="an"&&<div style={{minHeight:"100vh",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:"80px 20px",animation:"fadeIn 0.4s"}}>
        <div style={{width:80,height:80,position:"relative",marginBottom:30}}>{[0,10,20].map((ins,i)=><div key={i} style={{position:"absolute",inset:ins,borderRadius:"50%",border:"1px solid rgba(122,170,148,"+(0.35-i*0.1)+")",animation:"breathe 2s ease "+(i*0.3)+"s infinite"}}/>)}<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:6,height:6,borderRadius:"50%",background:T.acc2,animation:"breathe 1.5s ease infinite"}}/></div>
        <div style={{fontFamily:T.bf,fontSize:9,letterSpacing:"4px",textTransform:"uppercase",color:T.acc2,marginBottom:14}}>Analyse en cours</div>
        <h2 style={{fontFamily:T.df,fontSize:"clamp(20px,4vw,26px)",fontWeight:300,textAlign:"center",marginBottom:24}}>Votre système<br/><span style={{fontWeight:700,fontStyle:"italic"}}>de couches</span></h2>
        {[(aObj?.label||"")+" × "+(sObj?.label||""),wCity?(wTemp+"°C à "+wCity):"Conditions météo",(cObj?.e||"")+" "+(cObj?.label||"Analyse conditions"),"Membrane & isolation","Chaleur / respirabilité"].map((st,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,animation:"fadeUp 0.4s ease "+(0.3+i*0.3)+"s both"}}><div style={{width:4,height:4,borderRadius:"50%",background:T.acc2,animation:"pulse 1.2s ease "+(i*0.2)+"s infinite"}}/><span style={{fontFamily:T.bf,fontSize:11,color:T.grey,fontWeight:300}}>{st}</span></div>)}
      </div>}

      {/* RESULTS */}
      {ph==="res"&&res&&<div onClick={tch} style={{minHeight:"100vh",padding:"80px 0 24px",animation:"fadeIn 0.5s"}}>

        <ConfidenceBanner/>

        <div style={{padding:"0 clamp(16px,4vw,32px)",marginBottom:16}}>
          <div style={{fontFamily:T.bf,fontSize:"clamp(8px,1.3vw,10px)",letterSpacing:"4px",textTransform:"uppercase",color:T.acc2,marginBottom:8}}>Votre système personnalisé</div>
          <h2 style={{fontFamily:T.df,fontSize:"clamp(22px,4.5vw,34px)",fontWeight:300,lineHeight:1.15,marginBottom:12}}><span style={{fontWeight:700}}>4 pièces</span><span style={{fontStyle:"italic"}}> — </span>{aObj?.label} {dObj?.e||sObj?.e} {wCity||""}</h2>
          <div style={{display:"flex",gap:"clamp(12px,3vw,20px)",flexWrap:"wrap",padding:"10px 0",borderTop:"1px solid rgba(255,255,255,0.05)",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
            <div><div style={{fontFamily:T.bf,fontSize:8,letterSpacing:"2px",textTransform:"uppercase",color:T.grey}}>Total</div><div style={{fontFamily:T.df,fontSize:"clamp(18px,3vw,22px)",fontWeight:700,color:T.acc,marginTop:1}}>{total} €</div></div>
            <div><div style={{fontFamily:T.bf,fontSize:8,letterSpacing:"2px",textTransform:"uppercase",color:T.grey}}>vs Marché premium</div><div style={{fontFamily:T.df,fontSize:"clamp(14px,2vw,16px)",color:"rgba(255,255,255,0.3)",marginTop:1,textDecoration:"line-through"}}>{totalMarket} €</div></div>
            {[{l:"Garantie",v:"3 ans"},{l:"Fabrique",v:"Europe"},{l:"Retours",v:"30j"}].map((t,i)=><div key={i}><div style={{fontFamily:T.bf,fontSize:8,letterSpacing:"2px",textTransform:"uppercase",color:T.grey}}>{t.l}</div><div style={{fontFamily:T.df,fontSize:13,color:T.white,marginTop:1}}>{t.v}</div></div>)}
          </div>
        </div>

        {/* Layer Nav + Sliders */}
        <div style={{display:"flex",gap:16,margin:"0 clamp(16px,4vw,32px) 16px",padding:"14px",background:"rgba(255,255,255,0.015)",border:"1px solid rgba(255,255,255,0.04)"}}>
          <LayerNav items={res} activeLayer={activeLayer} onLayerClick={(i)=>{setActiveLayer(i);setExC(i);const el=document.getElementById("product-"+i);if(el)el.scrollIntoView({behavior:"smooth",block:"center"});}}/>
          <Sliders/>
        </div>

        {/* Product grid */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"clamp(6px,1.5vw,12px)",padding:"0 clamp(16px,4vw,32px)"}}>
        {res.map((p,i)=>{
          const sp=socialProof(p.id);
          const overBudget=p.price>budgetMax;
          return<div key={p.id+i} id={"product-"+i} style={{animation:"fadeUp 0.4s ease "+(i*0.08)+"s both",opacity:overBudget?0.4:1,transition:"opacity 0.3s"}}>
          <div onClick={()=>{tch();setExC(exC===i?null:i);setActiveLayer(i<3?i:null);}} style={{cursor:"pointer",position:"relative",aspectRatio:"3/4",overflow:"hidden",background:"#f0efeb"}}>
            <img src={p.dImg} alt={p.name} loading="lazy" onError={e=>{e.target.style.display="none";}} style={{width:"100%",height:"100%",objectFit:"contain",padding:"8%",transition:"transform 0.4s"}} onMouseEnter={e=>e.target.style.transform="scale(1.05)"} onMouseLeave={e=>e.target.style.transform="scale(1)"}/>
            <div style={{position:"absolute",top:6,left:6,background:"rgba(10,10,10,0.82)",padding:"3px 8px",borderRadius:2}}>
              <span style={{fontFamily:T.bf,fontSize:7,fontWeight:700,letterSpacing:"1.5px",color:T.acc2}}>{p.layerLabel}</span>
            </div>
            {p._matchPct&&<div style={{position:"absolute",top:6,right:6,background:"rgba(122,170,148,0.92)",padding:"3px 8px",borderRadius:2}}>
              <span style={{fontFamily:T.bf,fontSize:8,fontWeight:700,color:"#0a0a0a"}}>{p._matchPct}%</span>
            </div>}
            <div style={{position:"absolute",bottom:6,right:6,background:"rgba(10,10,10,0.75)",backdropFilter:"blur(4px)",padding:"3px 7px",borderRadius:2}}>
              <span style={{fontFamily:T.bf,fontSize:8,color:T.acc2,fontWeight:600}}>{sp.pct}%</span>
              <span style={{fontFamily:T.bf,fontSize:7,color:T.grey,marginLeft:3}}>choisi</span>
            </div>
            {exC===i&&<div style={{position:"absolute",inset:0,background:"rgba(10,10,10,0.5)",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontFamily:T.bf,fontSize:9,letterSpacing:"2px",textTransform:"uppercase",color:T.white}}>▾ Détails</span></div>}
          </div>
          <div style={{padding:"8px 2px 16px"}}>
            <div style={{fontFamily:T.bf,fontSize:8,letterSpacing:"2px",textTransform:"uppercase",color:T.acc2,marginBottom:2}}>{p.layerName}</div>
            <div style={{fontFamily:T.df,fontSize:"clamp(16px,2.8vw,22px)",fontWeight:700,lineHeight:1.15}}>{p.name}</div>
            <div style={{fontFamily:T.bf,fontSize:"clamp(10px,1.4vw,11px)",fontWeight:300,color:T.grey,marginBottom:4}}>{p.type}</div>
            <div style={{display:"flex",alignItems:"baseline",gap:6}}>
              <span style={{fontFamily:T.bf,fontSize:"clamp(12px,1.8vw,14px)",fontWeight:600}}>{p.price} €</span>
              <span style={{fontFamily:T.bf,fontSize:10,color:"rgba(255,255,255,0.25)",textDecoration:"line-through"}}>{Math.round(p.price*(MARKET_MULT[p.cat]||1.3))} €</span>
            </div>
          </div>
        </div>;})}
        </div>

        {/* Expanded detail panel */}
        {exC!==null&&res[exC]&&(()=>{const p=res[exC];const i=exC;return<div style={{margin:"0 clamp(16px,4vw,32px)",padding:"16px",background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.06)",animation:"fadeUp 0.25s"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontFamily:T.df,fontSize:20,fontWeight:700}}>{p.name} <span style={{fontFamily:T.bf,fontSize:11,fontWeight:300,color:T.grey}}>— {p.type}</span></div>
            <button onClick={()=>{setExC(null);setActiveLayer(null);}} style={{background:"none",border:"none",color:T.grey,fontSize:18,cursor:"pointer",padding:"0 4px"}}>×</button>
          </div>
          <div style={{padding:"10px 12px",marginBottom:12,background:"rgba(122,170,148,0.06)",borderLeft:"3px solid "+T.acc2}}>
            <div style={{fontFamily:T.bf,fontSize:8,letterSpacing:"2.5px",textTransform:"uppercase",color:T.acc2,marginBottom:4}}>Pourquoi cette pièce pour vous</div>
            <p style={{fontFamily:T.bf,fontSize:12,fontWeight:300,color:T.light,lineHeight:1.6}}>{getContextualWhy(p,act,sea,cond)}</p>
          </div>
          {p.specs&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1px",marginBottom:12,background:"rgba(255,255,255,0.03)"}}>
            {Object.entries(p.specs).map(([k,v])=><div key={k} style={{padding:"7px 10px",background:T.black}}><div style={{fontFamily:T.bf,fontSize:7,letterSpacing:"1.5px",textTransform:"uppercase",color:T.grey,marginBottom:2}}>{k}</div><div style={{fontFamily:T.bf,fontSize:11,color:T.white}}>{v}</div></div>)}
            {p.wt&&<div style={{padding:"7px 10px",background:T.black}}><div style={{fontFamily:T.bf,fontSize:7,letterSpacing:"1.5px",textTransform:"uppercase",color:T.grey,marginBottom:2}}>Étanchéité</div><div style={{fontFamily:T.bf,fontSize:11,color:T.acc}}>{p.wt}</div></div>}
          </div>}

          <button onClick={()=>{tch();setSA(sA===i?null:i);}} style={{width:"100%",padding:"8px",marginBottom:sA===i?8:10,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",color:T.grey,fontFamily:T.bf,fontSize:9,letterSpacing:"2px",textTransform:"uppercase",cursor:"pointer",transition:"border 0.3s"}} onMouseEnter={e=>e.target.style.borderColor="rgba(122,170,148,0.3)"} onMouseLeave={e=>e.target.style.borderColor="rgba(255,255,255,0.06)"}>
            {sA===i?"▾ Masquer":"▸ Alternatives AYAQ"}
          </button>
          {sA===i&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(100px,1fr))",gap:6,marginBottom:12}}>
            {P[p.cat].filter(x=>x.id!==p.id).map(alt=><div key={alt.id} onClick={()=>swap(i,alt)} style={{cursor:"pointer",overflow:"hidden",border:"1px solid rgba(255,255,255,0.05)",transition:"border 0.3s"}} onMouseEnter={e=>e.currentTarget.style.borderColor="rgba(122,170,148,0.3)"} onMouseLeave={e=>e.currentTarget.style.borderColor="rgba(255,255,255,0.05)"}>
              <div style={{aspectRatio:"1",background:"#f0efeb",overflow:"hidden"}}><img src={gen==="f"&&alt.imgF?alt.imgF:alt.img} alt={alt.name} loading="lazy" onError={e=>{e.target.style.display="none";}} style={{width:"100%",height:"100%",objectFit:"contain",padding:"8%"}}/></div>
              <div style={{padding:"5px 6px",background:T.black}}><div style={{fontFamily:T.bf,fontSize:11,fontWeight:600}}>{alt.name}</div><div style={{fontFamily:T.bf,fontSize:9,color:T.grey}}>{alt.type}</div><div style={{fontFamily:T.bf,fontSize:11,fontWeight:600,color:T.acc,marginTop:2}}>{alt.price}€</div></div>
            </div>)}
          </div>}

          <div style={{display:"flex",gap:6}}>
            <button style={{flex:2,padding:"12px",background:T.white,color:T.black,border:"none",fontFamily:T.bf,fontSize:10,fontWeight:600,letterSpacing:"1.5px",textTransform:"uppercase",cursor:"pointer",transition:"background 0.3s"}} onMouseEnter={e=>e.target.style.background=T.acc} onMouseLeave={e=>e.target.style.background=T.white}>Ajouter — {p.price}€</button>
            <a href={"https://ayaq.com"+(p.url||"/en")} target="_blank" rel="noopener noreferrer" style={{flex:1,padding:"12px",textDecoration:"none",background:"transparent",textAlign:"center",border:"1px solid rgba(255,255,255,0.1)",fontFamily:T.bf,fontSize:9,letterSpacing:"1px",textTransform:"uppercase",color:T.grey,display:"flex",alignItems:"center",justifyContent:"center"}}>AYAQ.com</a>
          </div>
        </div>;})()}

        <div style={{padding:"20px clamp(16px,4vw,32px) 12px"}}>
          <button style={{width:"100%",padding:"clamp(14px,2vw,18px)",background:T.white,color:T.black,border:"none",fontFamily:T.bf,fontSize:"clamp(10px,1.5vw,12px)",fontWeight:600,letterSpacing:"3px",textTransform:"uppercase",cursor:"pointer",transition:"background 0.3s"}} onMouseEnter={e=>e.target.style.background=T.acc} onMouseLeave={e=>e.target.style.background=T.white}>Tout ajouter — {total} €</button>
          <button onClick={reset} style={{width:"100%",marginTop:6,padding:"12px",background:"transparent",border:"1px solid rgba(255,255,255,0.08)",color:T.grey,fontFamily:T.bf,fontSize:9,letterSpacing:"2px",textTransform:"uppercase",cursor:"pointer"}}>Modifier ma sélection</button>
        </div>
        <div style={{padding:"16px 20px",borderTop:"1px solid rgba(255,255,255,0.04)",textAlign:"center"}}><div style={{fontFamily:T.bf,fontSize:7,letterSpacing:"3px",textTransform:"uppercase",color:"rgba(255,255,255,0.25)"}}>Vincent Defrasne, champion olympique · Mike Horn, explorateur</div></div>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
