<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ISCIACUS — Contextual Looks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0a0a0a;--bg-card:#141414;--bg-card-hover:#1a1a1a;
--text:#e8e8e6;--text-secondary:#8a8a8a;
--accent:#c9a96e;--accent-soft:rgba(201,169,110,0.15);
--border:#1e1e1e;--success:#4a9;--reject:#a44;
--font-serif:'Cormorant Garamond',serif;
--font-sans:'Outfit',sans-serif;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font-sans);
-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
touch-action:pan-y;overscroll-behavior:none}
#root{height:100%}

@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes nudgeIn{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes nudgeOut{from{transform:translateY(0);opacity:1}to{transform:translateY(100%);opacity:0}}

.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;
height:100%;gap:24px}
.loading-screen h1{font-family:var(--font-serif);font-size:2.4rem;font-weight:400;letter-spacing:.12em;color:var(--accent)}
.loading-screen p{font-size:.85rem;font-weight:300;color:var(--text-secondary);animation:pulse 2s ease-in-out infinite}
.loading-bar{width:120px;height:1px;background:var(--border);overflow:hidden;border-radius:1px}
.loading-bar-inner{height:100%;width:30%;background:var(--accent);animation:loadSlide 1.2s ease-in-out infinite}
@keyframes loadSlide{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}  }

.app-container{max-width:430px;margin:0 auto;height:100%;display:flex;flex-direction:column;
position:relative;overflow:hidden}

.context-bar{padding:12px 20px 4px;text-align:center;flex-shrink:0;position:relative;z-index:10;
display:flex;align-items:center;justify-content:space-between}
.context-left{text-align:left}
.context-line{font-family:var(--font-serif);font-size:.95rem;font-weight:400;color:var(--text);letter-spacing:.03em}
.context-weather{font-size:.7rem;color:var(--text-secondary);margin-top:1px;font-weight:300}
.logo{font-family:var(--font-serif);font-size:.65rem;letter-spacing:.25em;color:var(--accent);
text-transform:uppercase}
.look-counter{font-size:.65rem;color:var(--text-secondary);font-weight:300;margin-top:2px;text-align:right}

.card-area{flex:1;position:relative;overflow:hidden;padding:0 12px 0}

.bundle-card{position:absolute;top:0;left:12px;right:12px;bottom:0;
background:var(--bg-card);border-radius:16px 16px 0 0;border:1px solid var(--border);border-bottom:none;
display:flex;flex-direction:column;cursor:grab;user-select:none;
transition:none;will-change:transform;overflow-x:hidden;overflow-y:auto;
-webkit-overflow-scrolling:touch;scroll-behavior:smooth;scrollbar-width:none}
.bundle-card::-webkit-scrollbar{display:none}
.bundle-card.scrolled{cursor:default}
.bundle-card.animating{transition:transform .4s cubic-bezier(.25,.46,.45,.94),opacity .4s ease;pointer-events:none}
.bundle-card.entering{animation:cardEnter .35s cubic-bezier(.22,1,.36,1) forwards}
@keyframes cardEnter{from{transform:translateX(var(--enter-from,100px));opacity:0}to{transform:translateX(0);opacity:1}}

.bundle-card-inner{padding:14px 14px 8px;display:flex;flex-direction:column;gap:10px;
min-height:100%;justify-content:center;flex-shrink:0}

.products-grid{display:flex;gap:8px;justify-content:center}
.product-slot{width:calc(33.333% - 6px);min-width:85px;max-width:120px;cursor:pointer;
position:relative;transition:transform .15s ease}
.product-slot:active{transform:scale(.96)}
.product-slot.active{border-radius:10px;outline:2px solid var(--accent);outline-offset:2px}
.product-img-wrap{aspect-ratio:3/4;border-radius:8px;overflow:hidden;background:var(--bg-card-hover);
margin-bottom:4px;position:relative}
.product-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.product-slot-label{font-size:.6rem;font-weight:400;color:var(--text-secondary);text-transform:uppercase;
letter-spacing:.05em;text-align:center;line-height:1.1}
.product-slot-brand{font-size:.65rem;font-weight:500;color:var(--text);text-align:center;
white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-slot-price{font-size:.6rem;color:var(--accent);text-align:center;font-weight:400}

/* ─── Hero + Thumbnails layout ─────────────────────────────────── */
.hero-section{position:relative;width:100%;max-width:320px;margin:0 auto}
.hero-img-wrap{aspect-ratio:3/4;border-radius:12px;overflow:hidden;background:var(--bg-card-hover);
position:relative;cursor:pointer}
.hero-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;
transition:opacity .25s ease}
.hero-info{position:absolute;bottom:0;left:0;right:0;
background:linear-gradient(to top,rgba(10,10,10,.85) 0%,transparent 100%);
padding:14px 12px 10px;display:flex;justify-content:space-between;align-items:flex-end}
.hero-info-left{display:flex;flex-direction:column;gap:1px}
.hero-slot-label{font-size:.6rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.08em}
.hero-vendor{font-size:.85rem;font-weight:500;color:var(--text)}
.hero-title{font-size:.7rem;color:var(--text-secondary);font-weight:300;
white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
.hero-price{font-family:var(--font-serif);font-size:1.1rem;color:var(--accent);font-weight:500}

.thumb-strip{display:flex;gap:6px;justify-content:center;padding:2px 0}
.thumb-item{width:60px;cursor:pointer;position:relative;transition:transform .15s ease;
border-radius:8px;overflow:visible}
.thumb-item:active{transform:scale(.93)}
.thumb-item.selected{outline:2px solid var(--accent);outline-offset:2px;border-radius:8px}
.thumb-img{width:60px;height:80px;border-radius:8px;overflow:hidden;background:var(--bg-card-hover)}
.thumb-img img{width:100%;height:100%;object-fit:cover;display:block}
.thumb-label{font-size:.55rem;color:var(--text-secondary);text-align:center;
text-transform:uppercase;letter-spacing:.04em;margin-top:2px;line-height:1}
.thumb-price{font-size:.55rem;color:var(--accent);text-align:center;font-weight:400}

/* ─── Add-to-cart per product ──────────────────────────────────── */
.detail-card-atc{margin-top:8px;padding:10px;border:1px solid var(--accent);
background:transparent;color:var(--accent);font-family:var(--font-sans);font-size:.75rem;
font-weight:500;letter-spacing:.06em;border-radius:8px;cursor:pointer;width:100%;
transition:background .2s,color .2s;text-transform:uppercase}
.detail-card-atc:hover{background:var(--accent);color:var(--bg)}
.detail-card-atc:disabled{opacity:.5;cursor:wait}

.bundle-divider{height:1px;background:var(--border);margin:2px 0}

.bundle-footer{display:flex;align-items:center;justify-content:space-between;padding:0 4px}
.bundle-total{text-align:left}
.bundle-total-label{font-size:.7rem;font-weight:300;color:var(--text-secondary)}
.bundle-total-price{font-family:var(--font-serif);font-size:1.3rem;font-weight:500;color:var(--accent)}

.editorial-note{font-family:var(--font-serif);font-size:.85rem;font-weight:400;
color:var(--text-secondary);text-align:center;line-height:1.4;font-style:italic;
padding:0 4px}

.swipe-hint{text-align:center;font-size:.6rem;color:var(--text-secondary);
letter-spacing:.1em;opacity:.4;font-weight:300}

.bottom-bar{flex-shrink:0;padding:8px 12px;padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));
background:var(--bg);border-top:1px solid var(--border);display:flex;gap:8px;z-index:10}
.cta-button{flex:1;padding:13px;border:1px solid var(--accent);
background:transparent;color:var(--accent);font-family:var(--font-sans);font-size:.8rem;
font-weight:500;letter-spacing:.08em;border-radius:8px;cursor:pointer;
transition:background .2s,color .2s;text-align:center;text-transform:uppercase}
.cta-button:hover{background:var(--accent);color:var(--bg)}
.cta-button.primary{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.cta-button:disabled{opacity:.5;cursor:wait}
.cta-button.primary:hover{opacity:.9}
.swipe-btn{width:44px;height:44px;border-radius:50%;border:1px solid var(--border);
background:transparent;color:var(--text-secondary);font-size:1.1rem;cursor:pointer;
display:flex;align-items:center;justify-content:center;transition:border-color .2s,color .2s;flex-shrink:0}
.swipe-btn:hover{border-color:var(--accent);color:var(--accent)}

.swipe-indicator{position:absolute;top:50%;transform:translateY(-50%);
font-family:var(--font-serif);font-size:1.1rem;font-weight:500;
pointer-events:none;opacity:0;transition:opacity .15s;z-index:25}
.swipe-indicator.left{left:8px;color:var(--reject)}
.swipe-indicator.right{right:8px;color:var(--success)}

.alternatives-panel{position:sticky;bottom:0;left:0;right:0;
background:linear-gradient(to top,var(--bg-card) 90%,transparent);
padding:16px;animation:slideUp .25s ease forwards;z-index:5}
.alternatives-title{font-size:.7rem;color:var(--text-secondary);text-transform:uppercase;
letter-spacing:.08em;margin-bottom:10px;text-align:center}
.alternatives-row{display:flex;gap:10px;justify-content:center}
.alt-item{width:80px;cursor:pointer;transition:transform .15s}
.alt-item:active{transform:scale(.95)}
.alt-item .product-img-wrap{aspect-ratio:3/4;border-radius:6px;overflow:hidden;
background:var(--bg-card-hover);margin-bottom:4px}
.alt-item .product-img-wrap img{width:100%;height:100%;object-fit:cover}
.alt-item-name{font-size:.6rem;color:var(--text);text-align:center;
white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.alt-item-price{font-size:.6rem;color:var(--accent);text-align:center}
.alt-close{text-align:center;margin-top:10px;font-size:.65rem;color:var(--text-secondary);
cursor:pointer;text-decoration:underline;text-underline-offset:2px}

.nudge-toast{position:absolute;bottom:80px;left:20px;right:20px;
background:var(--accent-soft);border:1px solid rgba(201,169,110,.25);
border-radius:10px;padding:12px 16px;font-size:.8rem;font-weight:300;
color:var(--accent);text-align:center;z-index:20;
animation:nudgeIn .3s ease forwards}
.nudge-toast.exiting{animation:nudgeOut .3s ease forwards}

.detail-overlay{position:fixed;top:0;left:0;right:0;bottom:0;
background:rgba(10,10,10,.97);z-index:50;overflow-y:auto;
animation:fadeIn .25s ease}
.detail-content{max-width:430px;margin:0 auto;padding:20px}
.detail-close{position:sticky;top:0;text-align:right;padding:8px 0 16px;z-index:1}
.detail-close button{background:none;border:1px solid var(--border);color:var(--text);
padding:8px 16px;border-radius:6px;font-family:var(--font-sans);font-size:.75rem;cursor:pointer}
.detail-product{display:flex;gap:14px;padding:16px 0;border-bottom:1px solid var(--border)}
.detail-product:last-child{border-bottom:none}
.detail-img{width:100px;aspect-ratio:3/4;border-radius:8px;overflow:hidden;flex-shrink:0}
.detail-img img{width:100%;height:100%;object-fit:cover}
.detail-info{flex:1;display:flex;flex-direction:column;gap:4px;justify-content:center}
.detail-vendor{font-size:.65rem;color:var(--accent);text-transform:uppercase;letter-spacing:.06em}
.detail-name{font-size:.9rem;font-weight:400;color:var(--text)}
.detail-price{font-size:.85rem;color:var(--accent);font-weight:500}
.detail-sizes{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.detail-size{font-size:.6rem;padding:3px 7px;border:1px solid var(--border);border-radius:4px;
color:var(--text-secondary)}
.detail-link{font-size:.7rem;color:var(--accent);text-decoration:underline;
text-underline-offset:2px;margin-top:4px;display:inline-block}

.detail-total{text-align:center;padding:20px 0;border-top:1px solid var(--border);margin-top:8px}
.detail-total span{font-family:var(--font-serif);font-size:1.4rem;color:var(--accent)}

.slot-swap-btn{position:absolute;bottom:4px;right:4px;width:22px;height:22px;
border-radius:50%;background:rgba(10,10,10,.7);border:1px solid rgba(201,169,110,.4);
display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--accent);
cursor:pointer;opacity:.7;transition:opacity .2s,background .2s;z-index:2;padding:0;line-height:1}
.slot-swap-btn:hover,.slot-swap-btn:active{opacity:1;background:rgba(10,10,10,.9)}

.scroll-peek{text-align:center;padding:6px 0 2px;position:relative}
.scroll-peek::before{content:'';position:absolute;top:-30px;left:0;right:0;height:30px;
background:linear-gradient(to top,var(--bg-card),transparent);pointer-events:none}
.scroll-peek-chevron{display:inline-block;color:var(--text-secondary);font-size:.7rem;
opacity:.5;animation:peekBounce 2s ease-in-out infinite;letter-spacing:.15em}
@keyframes peekBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}
.scroll-peek-text{font-size:.55rem;color:var(--text-secondary);opacity:.4;
letter-spacing:.08em;text-transform:uppercase;margin-top:1px}

.bundle-details{padding:0 14px 20px}
.detail-card{border-top:1px solid var(--border);padding:16px 0}
.detail-card:first-child{border-top:none}
.detail-card-slot{font-size:.6rem;color:var(--text-secondary);text-transform:uppercase;
letter-spacing:.08em;margin-bottom:8px}
.detail-card-images{display:flex;gap:8px;overflow-x:auto;scroll-snap-type:x mandatory;
-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-bottom:12px;padding-bottom:2px}
.detail-card-images::-webkit-scrollbar{display:none}
.detail-card-images img{width:70%;max-width:260px;flex-shrink:0;aspect-ratio:3/4;object-fit:cover;
border-radius:10px;scroll-snap-align:center}
.detail-card-images .img-placeholder{width:70%;max-width:260px;flex-shrink:0;aspect-ratio:3/4;
border-radius:10px;background:var(--bg-card-hover);display:flex;align-items:center;
justify-content:center;color:var(--text-secondary);font-size:.7rem}
.detail-card-dots{display:flex;gap:4px;justify-content:center;margin-bottom:10px}
.detail-card-dot{width:5px;height:5px;border-radius:50%;background:var(--border)}
.detail-card-dot.active{background:var(--accent)}
.detail-card-vendor{font-size:.7rem;color:var(--accent);text-transform:uppercase;letter-spacing:.08em}
.detail-card-title{font-family:var(--font-serif);font-size:1.05rem;font-weight:400;color:var(--text);margin:2px 0}
.detail-card-price{font-size:.9rem;color:var(--accent);font-weight:500;margin-bottom:8px}
.detail-card-desc{font-size:.78rem;color:var(--text-secondary);line-height:1.5;margin-bottom:10px;
max-height:60px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.detail-card-sizes{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.detail-card-size{font-size:.7rem;padding:5px 10px;border:1px solid var(--border);border-radius:5px;
color:var(--text);transition:border-color .15s}
.detail-card-swap{display:flex;align-items:center;gap:6px;margin-top:6px;cursor:pointer;
font-size:.7rem;color:var(--text-secondary);transition:color .15s}
.detail-card-swap:hover{color:var(--accent)}

.context-input-bar{flex-shrink:0;padding:6px 12px;background:var(--bg);
border-top:1px solid var(--border);z-index:10}
.context-input-wrap{display:flex;gap:8px;align-items:center}
.context-input{flex:1;background:var(--bg-card);border:1px solid var(--border);
border-radius:20px;padding:10px 16px;font-family:var(--font-sans);font-size:.8rem;
color:var(--text);outline:none;transition:border-color .2s}
.context-input:focus{border-color:var(--accent)}
.context-input::placeholder{color:var(--text-secondary);font-style:italic;font-size:.75rem}
.context-send{width:36px;height:36px;border-radius:50%;background:var(--accent);
border:none;color:var(--bg);font-size:.9rem;cursor:pointer;flex-shrink:0;
display:flex;align-items:center;justify-content:center;transition:opacity .2s}
.context-send:disabled{opacity:.3;cursor:default}
.context-loading{display:flex;align-items:center;gap:10px;justify-content:center;padding:4px 0}
.context-loading-text{font-family:var(--font-serif);font-size:.9rem;color:var(--accent);
margin-bottom:10px;font-style:italic}
.context-loading .loading-bar{width:80px;margin:0 auto}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ─── Constants ──────────────────────────────────────────────────────
const SHOPIFY_DOMAIN = 'isciacus-store.myshopify.com';
const STOREFRONT_TOKEN = '09f1f52ca2f16b7e1a115cc2d41b1b78';
const API_VERSION = '2024-01';
const STOREFRONT_URL = `https://${SHOPIFY_DOMAIN}/api/${API_VERSION}/graphql.json`;

const BUNDLES_JSON_URL = 'data/isciacus-bundles.json';

const SLOT_MAP = {
  HAUT: ["T-Shirt", "Chemises", "Polos", "Sweats", "Pulls"],
  VESTE: ["Vestes", "Surchemises"],
  BAS: ["Pantalons", "Jeans", "Shorts & Bermudas", "Short de Bain"],
  CHAUSSURES: ["Chaussures", "Chaussures Norda"],
  ACCESSOIRE: ["Bobs", "Casquettes", "Sacs", "Maroquinerie", "Ceintures", "Chaussettes", "Accessoire", "Sous-Vêtements", "Bijoux"]
};
const SKIP_TYPES = ["Lifestyle & Objets"];

const DAYS_FR = ["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
const WEATHER_FR = {0:"Ciel dégagé",1:"Peu nuageux",2:"Peu nuageux",3:"Peu nuageux",
  45:"Brouillard",48:"Brouillard",51:"Bruine",53:"Bruine",55:"Bruine",
  56:"Bruine verglaçante",57:"Bruine verglaçante",
  61:"Pluie",63:"Pluie",65:"Pluie forte",66:"Pluie verglaçante",67:"Pluie verglaçante",
  71:"Neige",73:"Neige",75:"Neige forte",77:"Grésil",
  80:"Averses",81:"Averses",82:"Averses fortes",
  95:"Orage",96:"Orage",99:"Orage violent"};

function weatherCategory(code) {
  if (code <= 3) return 'clear';
  if (code <= 48) return 'fog';
  if (code <= 67) return 'rain';
  if (code <= 77) return 'snow';
  if (code <= 82) return 'showers';
  return 'storm';
}

function timePeriod(h) {
  if (h >= 21 || h < 6) return 'nuit';
  if (h < 9) return 'matin';
  if (h < 12) return 'matinée';
  if (h < 14) return 'midi';
  if (h < 18) return 'après-midi';
  return 'soirée';
}

function timeStyle(h, isWeekend) {
  if (isWeekend) return 'weekend';
  if (h >= 18) return 'evening';
  if (h >= 6 && h < 12) return 'morning';
  return 'afternoon';
}

// ─── Shopify API ────────────────────────────────────────────────────
const PRODUCTS_QUERY = `query($cursor: String) {
  products(first: 250, after: $cursor) {
    pageInfo { hasNextPage endCursor }
    edges { node {
      title handle productType vendor availableForSale
      priceRange { minVariantPrice { amount currencyCode } }
      images(first: 1) { edges { node { url altText } } }
      variants(first: 10) { edges { node {
        id title availableForSale
        price { amount currencyCode }
        selectedOptions { name value }
      } } }
    } }
  }
}`;

async function fetchAllProducts() {
  let all = [];
  let cursor = null;
  let hasNext = true;
  while (hasNext) {
    try {
      const res = await fetch(STOREFRONT_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Shopify-Storefront-Access-Token': STOREFRONT_TOKEN
        },
        body: JSON.stringify({ query: PRODUCTS_QUERY, variables: { cursor } })
      });
      const json = await res.json();
      if (!json.data || !json.data.products) { hasNext = false; break; }
      const data = json.data.products;
      const products = data.edges.map(e => e.node).filter(p => p.availableForSale);
      all = all.concat(products);
      hasNext = data.pageInfo.hasNextPage;
      cursor = data.pageInfo.endCursor;
    } catch (e) {
      console.warn('[Shopify] Fetch error:', e.message);
      hasNext = false;
    }
  }
  return all;
}

function categorizeProducts(products) {
  const catalog = { HAUT: [], VESTE: [], BAS: [], CHAUSSURES: [], ACCESSOIRE: [] };
  for (const p of products) {
    if (SKIP_TYPES.includes(p.productType)) continue;
    // Attach color family
    p._colorFamily = extractColorFamily(p);
    for (const [slot, types] of Object.entries(SLOT_MAP)) {
      if (types.includes(p.productType)) {
        catalog[slot].push(p);
        break;
      }
    }
  }
  return catalog;
}

async function fetchWeather() {
  try {
    const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=48.86&longitude=2.35&current=temperature_2m,weather_code&timezone=Europe/Paris');
    const data = await res.json();
    return { temp: Math.round(data.current.temperature_2m), code: data.current.weather_code };
  } catch {
    return { temp: 14, code: 2 };
  }
}

// ─── Shopify Cart API ───────────────────────────────────────────────
const CART_CREATE = `mutation cartCreate($input: CartInput!) {
  cartCreate(input: $input) {
    cart { id checkoutUrl }
    userErrors { field message }
  }
}`;

async function createShopifyCart(products) {
  const lines = products.filter(Boolean).map(p => {
    const av = p.variants.edges.find(e => e.node.availableForSale);
    if (!av) return null;
    return { merchandiseId: av.node.id, quantity: 1 };
  }).filter(Boolean);

  if (lines.length === 0) return null;

  try {
    const res = await fetch(STOREFRONT_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Shopify-Storefront-Access-Token': STOREFRONT_TOKEN
      },
      body: JSON.stringify({ query: CART_CREATE, variables: { input: { lines } } })
    });
    const json = await res.json();
    if (json.data?.cartCreate?.cart?.checkoutUrl) {
      return json.data.cartCreate.cart.checkoutUrl;
    }
    console.warn('[Cart] errors:', json.data?.cartCreate?.userErrors);
  } catch (e) {
    console.warn('[Cart] error:', e.message);
  }
  return null;
}

// ─── Color Coherence ────────────────────────────────────────────────
const COLOR_KEYWORDS = {
  NOIR: ['noir','black','dark','charcoal','storm','midnight'],
  BLANC: ['blanc','white','ecru','cream','ivory','off-white','bone','natural','off white'],
  MARINE: ['navy','marine','bleu','blue','indigo','ink','slate','deep blue','deep green'],
  VERT: ['olive','green','vert','khaki','kaki','pine','lichen','sage','smoke green','rosemary'],
  TERRE: ['brown','chocolat','cognac','tan','camel','walnut','sand','beige','stone','moutarde','palisander','cinder','rust','burn sugar'],
  ROUGE: ['red','orange','salmon','vermillion','rose','pink','violet','purple'],
  GRIS: ['grey','gris','silver','mist','ash','smoke','light'],
};

// Palettes: which families go well together
const COLOR_PALETTES = [
  ['NOIR','BLANC','GRIS'],           // Monochrome
  ['NOIR','MARINE','BLANC'],         // Classic
  ['TERRE','VERT','BLANC'],          // Earth
  ['MARINE','BLANC','TERRE'],        // Maritime
  ['NOIR','VERT','TERRE'],           // Urban outdoor
  ['GRIS','MARINE','BLANC'],         // Soft
  ['NOIR','TERRE','GRIS'],           // Neutral warm
  ['VERT','TERRE','NOIR'],           // Safari
];

// Universals: these go with everything
const UNIVERSAL_FAMILIES = new Set(['NOIR','BLANC','GRIS']);

function extractColorFamily(product) {
  // Try variant color option first
  for (const v of product.variants.edges) {
    for (const opt of v.node.selectedOptions) {
      if (opt.name === 'Couleur' || opt.name === 'Color' || opt.name === 'colour') {
        const c = opt.value.toLowerCase().replace(/[.\s]+$/,'');
        for (const [family, keywords] of Object.entries(COLOR_KEYWORDS)) {
          if (keywords.some(k => c.includes(k))) return family;
        }
      }
    }
  }
  // Fallback: parse title
  const title = product.title.toLowerCase();
  for (const [family, keywords] of Object.entries(COLOR_KEYWORDS)) {
    if (keywords.some(k => title.includes(k))) return family;
  }
  return 'NOIR'; // default neutral
}

function colorScore(items) {
  const families = Object.values(items).filter(Boolean).map(p => p._colorFamily || 'NOIR');
  const unique = [...new Set(families)];

  // All same family = perfect
  if (unique.length <= 1) return 10;

  // Check if it matches a known palette
  for (const palette of COLOR_PALETTES) {
    if (unique.every(f => palette.includes(f) || UNIVERSAL_FAMILIES.has(f))) return 9;
  }

  // All universals + 1 accent = great
  const nonUniversal = unique.filter(f => !UNIVERSAL_FAMILIES.has(f));
  if (nonUniversal.length <= 1) return 8;

  // 2 non-universal but compatible
  if (nonUniversal.length === 2) {
    const compatible = [['MARINE','TERRE'],['VERT','TERRE'],['MARINE','VERT'],['TERRE','ROUGE']];
    if (compatible.some(([a,b]) =>
      (nonUniversal.includes(a) && nonUniversal.includes(b)))) return 7;
  }

  // 3+ clashing colors
  return Math.max(1, 5 - nonUniversal.length);
}

function pickColorCoherent(pool, existingItems, brandPrefs, avoidIds) {
  if (!pool || pool.length === 0) return null;
  const filtered = pool.filter(p => !avoidIds.has(p.handle));
  if (filtered.length === 0) return pickRandom(pool);

  const existingFamilies = Object.values(existingItems).filter(Boolean).map(p => p._colorFamily || 'NOIR');

  // Score each candidate
  const scored = filtered.map(p => {
    const family = p._colorFamily || 'NOIR';
    let score = 0;

    // Color coherence
    if (existingFamilies.length === 0) {
      score = 5; // first pick, neutral
    } else if (UNIVERSAL_FAMILIES.has(family)) {
      score = 7; // universals always good
    } else if (existingFamilies.includes(family)) {
      score = 8; // same family = harmonious
    } else {
      // Check palette compatibility
      const allFamilies = [...existingFamilies, family];
      const nonUniv = [...new Set(allFamilies.filter(f => !UNIVERSAL_FAMILIES.has(f)))];
      score = nonUniv.length <= 1 ? 7 : nonUniv.length <= 2 ? 5 : 2;
    }

    // Brand preference bonus
    score += (brandPrefs[p.vendor] || 0) * 0.3;

    return { p, score };
  });

  // Weighted random by score
  const total = scored.reduce((s, x) => s + Math.max(x.score, 0.5), 0);
  let r = Math.random() * total;
  for (const { p, score } of scored) {
    r -= Math.max(score, 0.5);
    if (r <= 0) return p;
  }
  return scored[scored.length - 1].p;
}

// ─── Bundle Composition ─────────────────────────────────────────────
function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function weightedPick(arr, brandPrefs, avoidIds) {
  if (!arr || arr.length === 0) return null;
  const filtered = arr.filter(p => !avoidIds.has(p.handle));
  if (filtered.length === 0) return pickRandom(arr);
  if (Object.keys(brandPrefs).length === 0) return pickRandom(filtered);
  const weighted = filtered.map(p => {
    const w = 1 + (brandPrefs[p.vendor] || 0) * 0.5;
    return { p, w };
  });
  const total = weighted.reduce((s, x) => s + x.w, 0);
  let r = Math.random() * total;
  for (const { p, w } of weighted) {
    r -= w;
    if (r <= 0) return p;
  }
  return weighted[weighted.length - 1].p;
}

// ─── Thompson Sampling Preference Engine ─────────────────────────────
// Multi-axis Bayesian preference learning from swipe behavior.
// Each axis tracks a Beta(α, β) distribution per value.
// Right swipe → α += credit, Left swipe → β += credit.
// Thompson Sampling: sample from Beta distributions to balance exploration/exploitation.

const PREFERENCE_AXES = {
  style:      ['workwear','minimal','street','elevated','gorpcore','heritage','french-casual'],
  color:      ['NOIR','BLANC','MARINE','VERT','TERRE','ROUGE','GRIS'],
  silhouette: ['relaxed','regular','structured'],
  formality:  ['decontracte','smart-casual'],
  priceRange: ['budget','mid','premium'], // <100€, 100-200€, >200€
};

// Prior: Beta(1,1) = uniform. Higher α = more liked, higher β = more disliked.
function initPreferences() {
  const prefs = {};
  for (const [axis, values] of Object.entries(PREFERENCE_AXES)) {
    prefs[axis] = {};
    for (const v of values) {
      prefs[axis][v] = { alpha: 1, beta: 1 };
    }
  }
  return prefs;
}

// Approximate Beta distribution sampling using Johnk's algorithm
function sampleBeta(alpha, beta) {
  // For small alpha/beta, use the inverse CDF approximation
  function gammaRand(shape) {
    if (shape < 1) {
      return gammaRand(shape + 1) * Math.pow(Math.random(), 1 / shape);
    }
    const d = shape - 1/3;
    const c = 1 / Math.sqrt(9 * d);
    while (true) {
      let x, v;
      do {
        x = gaussRand();
        v = Math.pow(1 + c * x, 3);
      } while (v <= 0);
      const u = Math.random();
      if (u < 1 - 0.0331 * x * x * x * x) return d * v;
      if (Math.log(u) < 0.5 * x * x + d * (1 - v + Math.log(v))) return d * v;
    }
  }
  function gaussRand() {
    let u, v, s;
    do { u = Math.random() * 2 - 1; v = Math.random() * 2 - 1; s = u*u + v*v; } while (s >= 1 || s === 0);
    return u * Math.sqrt(-2 * Math.log(s) / s);
  }
  const x = gammaRand(alpha);
  const y = gammaRand(beta);
  return x / (x + y);
}

// Extract axes from a bundle's items
function extractBundleAxes(bundle) {
  const items = Object.values(bundle.items).filter(Boolean);
  const axes = { style: [], color: [], silhouette: [], formality: [], priceRange: [] };

  for (const item of items) {
    // Color from _colorFamily
    const color = item._colorFamily || 'NOIR';
    if (!axes.color.includes(color)) axes.color.push(color);

    // Price range
    const price = parseFloat(item.priceRange?.minVariantPrice?.amount || '0');
    const range = price < 100 ? 'budget' : price > 200 ? 'premium' : 'mid';
    if (!axes.priceRange.includes(range)) axes.priceRange.push(range);

    // Style, silhouette, formality from vendor (brand DNA)
    const vendor = item.vendor?.toUpperCase();
    const brandMeta = BRAND_STYLE_MAP[vendor];
    if (brandMeta) {
      for (const s of brandMeta.styles) { if (!axes.style.includes(s)) axes.style.push(s); }
      if (!axes.silhouette.includes(brandMeta.silhouette)) axes.silhouette.push(brandMeta.silhouette);
      if (!axes.formality.includes(brandMeta.formality)) axes.formality.push(brandMeta.formality);
    }
  }

  return axes;
}

// Brand → style/silhouette/formality mapping (client-side version of generate-bundles.mjs)

// IDF weights — computed once at init, amplifies rare axis values
let _idfWeights = null;
function getIdfWeights(bundles) {
  if (_idfWeights) return _idfWeights;
  const N = bundles.length;
  const freq = {};
  for (const [axis, values] of Object.entries(PREFERENCE_AXES)) {
    freq[axis] = {};
    for (const v of values) freq[axis][v] = 0;
  }
  for (const bundle of bundles) {
    if (bundle.style && freq.style[bundle.style] !== undefined) freq.style[bundle.style]++;
    if (bundle.silhouette && freq.silhouette[bundle.silhouette] !== undefined) freq.silhouette[bundle.silhouette]++;
    if (bundle.formality && freq.formality[bundle.formality] !== undefined) freq.formality[bundle.formality]++;
    for (const item of Object.values(bundle.items || {})) {
      for (const c of (item.colors || [])) {
        if (freq.color[c] !== undefined) freq.color[c]++;
      }
      const price = item.price || 0;
      const range = price < 100 ? 'budget' : price > 200 ? 'premium' : 'mid';
      if (freq.priceRange[range] !== undefined) freq.priceRange[range]++;
    }
  }
  _idfWeights = {};
  for (const [axis, counts] of Object.entries(freq)) {
    _idfWeights[axis] = {};
    for (const [v, count] of Object.entries(counts)) {
      _idfWeights[axis][v] = count > 0 ? Math.log(1 + N / count) : 0;
    }
  }
  return _idfWeights;
}

// Update preferences after a swipe — IDF-weighted contrastive credit assignment
const CONTRASTIVE_WEIGHT = 0.2;
function updatePreferences(prefs, bundleAxes, direction) {
  for (const [axis, values] of Object.entries(bundleAxes)) {
    if (!prefs[axis]) continue;
    const credit = values.length > 0 ? 1.0 / values.length : 0;
    const allValues = PREFERENCE_AXES[axis] || [];
    const idf = _idfWeights?.[axis] || {};

    for (const v of allValues) {
      if (!prefs[axis][v]) continue;
      const w = idf[v] || 0;
      if (w === 0) continue; // value never appears in corpus
      const inBundle = values.includes(v);

      if (direction === 'right') {
        if (inBundle) {
          prefs[axis][v].alpha += credit * w;
        } else {
          prefs[axis][v].beta += credit * CONTRASTIVE_WEIGHT;
        }
      } else {
        if (inBundle) {
          prefs[axis][v].beta += credit * w;
        } else {
          prefs[axis][v].alpha += credit * CONTRASTIVE_WEIGHT;
        }
      }
    }
  }
  return prefs;
}

// Score a product based on current preference distributions (Thompson Sampling)
// Fixed: one sample per axis (not per style), avoids double-counting multi-style brands
function thompsonScore(product, prefs) {
  let score = 0;
  const axisCount = 5; // Always normalize by 5 axes for fair comparison

  // Color
  const color = product._colorFamily || 'NOIR';
  if (prefs.color[color]) {
    score += sampleBeta(prefs.color[color].alpha, prefs.color[color].beta);
  }

  // Price range
  const price = parseFloat(product.priceRange?.minVariantPrice?.amount || '0');
  const range = price < 100 ? 'budget' : price > 200 ? 'premium' : 'mid';
  if (prefs.priceRange[range]) {
    score += sampleBeta(prefs.priceRange[range].alpha, prefs.priceRange[range].beta);
  }

  // Style + silhouette + formality from brand
  const vendor = product.vendor?.toUpperCase();
  const brandMeta = BRAND_STYLE_MAP[vendor];
  if (brandMeta) {
    // Style: take MAX sample across brand's styles (not sum) — fixes multi-style double-count
    if (brandMeta.styles.length > 0) {
      let bestStyle = 0;
      for (const s of brandMeta.styles) {
        if (prefs.style[s]) {
          bestStyle = Math.max(bestStyle, sampleBeta(prefs.style[s].alpha, prefs.style[s].beta));
        }
      }
      score += bestStyle;
    }
    if (prefs.silhouette[brandMeta.silhouette]) {
      score += sampleBeta(prefs.silhouette[brandMeta.silhouette].alpha, prefs.silhouette[brandMeta.silhouette].beta);
    }
    if (prefs.formality[brandMeta.formality]) {
      score += sampleBeta(prefs.formality[brandMeta.formality].alpha, prefs.formality[brandMeta.formality].beta);
    }
  }

  return score / axisCount;
}

// Pick from pool using Thompson Sampling scores + color coherence
function thompsonPick(pool, existingItems, prefs, avoidIds) {
  if (!pool || pool.length === 0) return null;
  const candidates = pool.filter(p => !avoidIds.has(p.handle));
  if (candidates.length === 0) return pool.length > 0 ? pool[Math.floor(Math.random() * pool.length)] : null;

  const existingColors = Object.values(existingItems).filter(Boolean).map(p => p._colorFamily || 'NOIR');

  const scored = candidates.map(p => {
    // Thompson preference score (exploration + exploitation)
    let score = thompsonScore(p, prefs) * 6;

    // Color coherence bonus
    const pColor = p._colorFamily || 'NOIR';
    if (existingColors.length === 0) {
      score += 2; // First item, no penalty
    } else if (UNIVERSAL_FAMILIES.has(pColor)) {
      score += 3; // Universals always safe
    } else if (existingColors.includes(pColor)) {
      score += 3; // Same color family = harmonious
    } else {
      // Check palette compatibility
      const allColors = [...existingColors, pColor];
      const nonU = allColors.filter(c => !UNIVERSAL_FAMILIES.has(c));
      const inPalette = COLOR_PALETTES.some(pal => nonU.every(c => pal.includes(c)));
      score += inPalette ? 2.5 : 0.5;
    }

    return { p, score: Math.max(0.1, score) };
  });

  // Weighted random pick
  const total = scored.reduce((s, x) => s + x.score, 0);
  let r = Math.random() * total;
  for (const { p, score } of scored) {
    r -= score;
    if (r <= 0) return p;
  }
  return scored[scored.length - 1].p;
}

function composeBundle(catalog, weather, signals, previousBundle, direction) {
  const temp = weather.temp;
  const wCat = weatherCategory(weather.code);
  const now = new Date();
  const hour = now.getHours();
  const isWeekend = now.getDay() === 0 || now.getDay() === 6;
  const style = timeStyle(hour, isWeekend);

  const avoidIds = new Set();
  if (previousBundle) {
    Object.values(previousBundle.items).forEach(p => { if (p) avoidIds.add(p.handle); });
  }
  if (direction === 'left' && signals.avoidedProducts.length > 0) {
    signals.avoidedProducts.slice(-10).forEach(h => avoidIds.add(h));
  }

  const brandPrefs = signals.preferredBrands || {};
  const typePrefs = signals.preferredTypes || {};
  const prefs = signals.preferences || initPreferences();

  // Filter pools by weather/season
  let hautPool = [...catalog.HAUT];
  let basPool = [...catalog.BAS];
  let vestePool = [...catalog.VESTE];
  let chaussuresPool = [...catalog.CHAUSSURES];
  let accessoirePool = [...catalog.ACCESSOIRE];

  if (temp > 20) {
    hautPool = hautPool.filter(p => ['T-Shirt','Chemises','Polos'].includes(p.productType));
    if (hautPool.length === 0) hautPool = catalog.HAUT;
    const summerBas = basPool.filter(p => ['Shorts & Bermudas','Short de Bain','Pantalons','Jeans'].includes(p.productType));
    if (summerBas.length > 0) basPool = summerBas;
  } else if (temp < 10) {
    hautPool = hautPool.filter(p => ['Sweats','Pulls','Chemises'].includes(p.productType));
    if (hautPool.length === 0) hautPool = catalog.HAUT;
    basPool = basPool.filter(p => ['Pantalons','Jeans'].includes(p.productType));
    if (basPool.length === 0) basPool = catalog.BAS;
  }

  // Time/style filtering
  if (style === 'morning') {
    const structured = hautPool.filter(p => ['Chemises','Polos'].includes(p.productType));
    if (structured.length >= 2) hautPool = structured;
    const pantalons = basPool.filter(p => p.productType === 'Pantalons');
    if (pantalons.length >= 2) basPool = pantalons;
  } else if (style === 'weekend') {
    const casual = hautPool.filter(p => ['T-Shirt','Sweats'].includes(p.productType));
    if (casual.length >= 2) hautPool = casual;
  } else if (style === 'evening') {
    const evening = hautPool.filter(p => ['Chemises','Surchemises','Polos'].includes(p.productType));
    if (evening.length >= 1) hautPool = [...evening, ...hautPool.filter(p => !evening.includes(p))].slice(0, Math.max(evening.length, 3));
  }

  // Apply type preferences from signals
  if (Object.keys(typePrefs).length > 0) {
    const topTypes = Object.entries(typePrefs).sort((a,b) => b[1] - a[1]).map(e => e[0]);
    for (const t of topTypes) {
      if (SLOT_MAP.HAUT.includes(t)) {
        const pref = hautPool.filter(p => p.productType === t);
        if (pref.length >= 2 && typePrefs[t] >= 2) hautPool = pref;
      }
    }
  }

  // Pick items using Thompson Sampling + color coherence
  const picked = {};
  const haut = thompsonPick(hautPool, picked, prefs, avoidIds);
  if (haut) picked.haut = haut;

  const bas = thompsonPick(basPool, picked, prefs, avoidIds);
  if (bas) picked.bas = bas;

  const chaussures = thompsonPick(chaussuresPool, picked, prefs, avoidIds);
  if (chaussures) picked.chaussures = chaussures;

  // Veste logic
  let veste = null;
  const needVeste = temp < 10 || (temp < 20 && Math.random() > 0.3) || (wCat === 'rain' || wCat === 'showers' || wCat === 'storm');
  if (needVeste && vestePool.length > 0) {
    veste = thompsonPick(vestePool, picked, prefs, avoidIds);
    if (veste) picked.veste = veste;
  }

  // Accessoire (optional, ~60% chance)
  let accessoire = null;
  if (accessoirePool.length > 0 && Math.random() > 0.4) {
    accessoire = thompsonPick(accessoirePool, picked, prefs, avoidIds);
  }

  // Brand coherence: if 3+ items same brand, swap one
  const items = { haut, veste, bas, chaussures, accessoire };
  const brandCount = {};
  Object.values(items).forEach(p => {
    if (p) brandCount[p.vendor] = (brandCount[p.vendor] || 0) + 1;
  });
  const overBrand = Object.entries(brandCount).find(([, c]) => c >= 3);
  if (overBrand) {
    const [brand] = overBrand;
    const slotsWithBrand = Object.entries(items).filter(([, p]) => p && p.vendor === brand);
    if (slotsWithBrand.length >= 3) {
      const [swapSlot] = slotsWithBrand[slotsWithBrand.length - 1];
      const pool = catalog[swapSlot.toUpperCase()] || [];
      const alt = pool.filter(p => p.vendor !== brand && !avoidIds.has(p.handle));
      if (alt.length > 0) items[swapSlot] = pickRandom(alt);
    }
  }

  return { items, timestamp: Date.now() };
}

// Score a RAG bundle using Thompson Sampling on its pre-tagged axes
function scoreRAGBundle(ragBundle, prefs) {
  let score = 0;
  let axes = 0;

  // Style
  if (ragBundle.style && prefs.style[ragBundle.style]) {
    score += sampleBeta(prefs.style[ragBundle.style].alpha, prefs.style[ragBundle.style].beta);
    axes++;
  }

  // Silhouette
  if (ragBundle.silhouette && prefs.silhouette[ragBundle.silhouette]) {
    score += sampleBeta(prefs.silhouette[ragBundle.silhouette].alpha, prefs.silhouette[ragBundle.silhouette].beta);
    axes++;
  }

  // Formality
  if (ragBundle.formality && prefs.formality[ragBundle.formality]) {
    score += sampleBeta(prefs.formality[ragBundle.formality].alpha, prefs.formality[ragBundle.formality].beta);
    axes++;
  }

  // Colors from items (average across all item colors)
  const allColors = [];
  for (const item of Object.values(ragBundle.items)) {
    if (item && item.colors) allColors.push(...item.colors);
  }
  for (const c of [...new Set(allColors)]) {
    if (prefs.color[c]) {
      score += sampleBeta(prefs.color[c].alpha, prefs.color[c].beta);
      axes++;
    }
  }

  // Price range from total
  const total = ragBundle.total || 0;
  const avgPrice = total / Math.max(1, Object.keys(ragBundle.items).length);
  const range = avgPrice < 100 ? 'budget' : avgPrice > 200 ? 'premium' : 'mid';
  if (prefs.priceRange[range]) {
    score += sampleBeta(prefs.priceRange[range].alpha, prefs.priceRange[range].beta);
    axes++;
  }

  return axes > 0 ? score / axes : 0.5;
}

// Determine current season from weather
function currentSeason(temp) {
  if (temp > 22) return 'ete';
  if (temp < 10) return 'hiver';
  return 'mi-saison';
}

// Select best bundle from RAG using Thompson Sampling
function selectRAGBundle(ragData, productMap, weather, prefs, seenBundleIndices, direction, geminiDir) {
  if (!ragData || !ragData.bundles || ragData.bundles.length === 0) return null;

  const season = currentSeason(weather.temp);
  const now = new Date();
  const hour = now.getHours();
  const isWeekend = now.getDay() === 0 || now.getDay() === 6;

  // Filter bundles by season compatibility
  const candidates = ragData.bundles.map((b, idx) => ({ bundle: b, idx }))
    .filter(({ bundle, idx }) => {
      if (seenBundleIndices.has(idx)) return false;
      if (bundle.season !== season && bundle.season !== 'toute-saison') return false;
      const resolved = resolveRAGItems(bundle.items, productMap);
      if (Object.values(resolved).filter(Boolean).length < 2) return false;
      return true;
    });

  if (candidates.length === 0) {
    if (seenBundleIndices.size > 0) {
      seenBundleIndices.clear();
      return selectRAGBundle(ragData, productMap, weather, prefs, seenBundleIndices, direction, geminiDir);
    }
    return null;
  }

  // Contextual occasion bonus
  let preferOccasion = isWeekend ? 'weekend' : (hour >= 18 ? 'sortie' : 'bureau-casual');

  // Score each candidate
  const scored = candidates.map(({ bundle, idx }) => {
    let score = scoreRAGBundle(bundle, prefs) * 8;
    // Occasion bonus
    if (bundle.occasion === preferOccasion) score += 2;
    // Gemini direction bonus (heavy boost when user explicitly asked via chat)
    if (geminiDir) {
      // Style axis match
      if (geminiDir.axis && bundle.style === geminiDir.axis) score += 5;
      // Slot type match (e.g., accessoire: "casquette" matches bundle with casquette)
      if (geminiDir.slots) {
        for (const [slot, wanted] of Object.entries(geminiDir.slots)) {
          if (!wanted) continue;
          const item = bundle.items[slot];
          if (item) {
            const titleLower = (item.title || '').toLowerCase();
            const typeLower = (item.type || '').toLowerCase();
            const wantedLower = wanted.toLowerCase();
            if (titleLower.includes(wantedLower) || typeLower.includes(wantedLower) || typeLower.includes(wantedLower + 's')) {
              score += 10; // strong boost for explicit slot match
            }
          }
        }
      }
      // Brand priority match
      if (geminiDir.brands_priority) {
        const vendors = Object.values(bundle.items).map(i => (i.vendor || '').toUpperCase());
        for (const brand of geminiDir.brands_priority) {
          if (vendors.some(v => v.includes(brand.toUpperCase()))) score += 3;
        }
      }
    }
    return { bundle, idx, score: Math.max(0.1, score) };
  });

  // Weighted random selection (Thompson Sampling style)
  const total = scored.reduce((s, x) => s + x.score, 0);
  let r = Math.random() * total;
  for (const item of scored) {
    r -= item.score;
    if (r <= 0) return item;
  }
  return scored[scored.length - 1];
}

// Resolve RAG item handles to full Shopify product objects
function resolveRAGItems(ragItems, productMap) {
  const resolved = {};
  for (const [slot, item] of Object.entries(ragItems)) {
    if (item && item.handle && productMap[item.handle]) {
      const p = productMap[item.handle];
      // Attach color family if not set
      if (!p._colorFamily) p._colorFamily = extractColorFamily(p);
      resolved[slot] = p;
    }
  }
  return resolved;
}

// Resolve RAG alternatives to full Shopify product objects
function resolveRAGAlternatives(ragAlts, productMap) {
  if (!ragAlts) return {};
  const resolved = {};
  for (const [slot, alts] of Object.entries(ragAlts)) {
    resolved[slot.toUpperCase()] = (alts || [])
      .map(a => a.handle ? productMap[a.handle] : null)
      .filter(Boolean);
  }
  return resolved;
}

// Extract Thompson axes from a RAG bundle (using pre-tagged data)
function extractRAGBundleAxes(ragBundle) {
  const axes = { style: [], color: [], silhouette: [], formality: [], priceRange: [] };
  if (ragBundle.style) axes.style.push(ragBundle.style);
  if (ragBundle.silhouette) axes.silhouette.push(ragBundle.silhouette);
  if (ragBundle.formality) axes.formality.push(ragBundle.formality);
  for (const item of Object.values(ragBundle.items)) {
    if (item && item.colors) {
      for (const c of item.colors) {
        if (!axes.color.includes(c)) axes.color.push(c);
      }
    }
  }
  const total = ragBundle.total || 0;
  const avgPrice = total / Math.max(1, Object.keys(ragBundle.items).length);
  axes.priceRange.push(avgPrice < 100 ? 'budget' : avgPrice > 200 ? 'premium' : 'mid');
  return axes;
}

function getPrice(p) {
  return parseFloat(p.priceRange.minVariantPrice.amount);
}
function getImage(p, width = 300) {
  if (p.images.edges.length === 0) return '';
  const url = p.images.edges[0].node.url;
  return url.includes('?') ? url + '&width=' + width : url + '?width=' + width;
}
function getAllImages(p) {
  return p.images.edges.map(e => {
    const url = e.node.url;
    return url.includes('?') ? url + '&width=600' : url + '?width=600';
  });
}
function getSizes(p) {
  return p.variants.edges
    .filter(e => e.node.availableForSale)
    .map(e => {
      const sizeOpt = e.node.selectedOptions.find(o => o.name === 'Size' || o.name === 'Taille');
      return sizeOpt ? sizeOpt.value : e.node.title;
    })
    .filter((v, i, a) => a.indexOf(v) === i);
}

function bundleTotal(bundle) {
  return Object.values(bundle.items).filter(Boolean).reduce((s, p) => s + getPrice(p), 0);
}

// ─── Editorial Notes ────────────────────────────────────────────────
function generateEditorial(bundle, weather, style) {
  const items = bundle.items;
  const brands = [...new Set(Object.values(items).filter(Boolean).map(p => p.vendor))];
  const families = [...new Set(Object.values(items).filter(Boolean).map(p => p._colorFamily || 'NOIR'))];
  const temp = weather.temp;

  const FAMILY_FR = {NOIR:'tons sombres',BLANC:'tons clairs',MARINE:'camaïeu bleu',
    VERT:'palette nature',TERRE:'tons terre',ROUGE:'touche de couleur',GRIS:'palette grise'};

  const templates = [];

  // Color-focused
  const nonUniv = families.filter(f => !UNIVERSAL_FAMILIES.has(f));
  if (families.length <= 2) {
    const palette = families.map(f => FAMILY_FR[f] || f).join(' et ');
    templates.push(`Palette ${palette} — cohérence chromatique naturelle.`);
  }
  if (nonUniv.length === 1) {
    templates.push(`Base neutre rehaussée par des ${FAMILY_FR[nonUniv[0]] || 'accents'} — l'équilibre juste.`);
  }
  if (nonUniv.length === 0 && families.length > 1) {
    templates.push(`Monochrome maîtrisé — quand les neutres font tout le travail.`);
  }

  // Brand-focused
  if (brands.length >= 2) {
    templates.push(`${brands[0]} rencontre ${brands[1]} — le genre de mix qu'on ne trouve qu'en concept store.`);
  }
  if (brands.length === 1) {
    templates.push(`Full ${brands[0]} pour un look cohérent sans effort.`);
  }

  // Weather-focused
  if (temp > 20) {
    templates.push(`Look estival pensé pour ${temp}° — léger, sans sacrifier le style.`);
    templates.push(`Été en ville : pièces respirantes et silhouette épurée.`);
  } else if (temp < 10) {
    templates.push(`${temp}° dehors : on superpose avec intention. Chaque couche compte.`);
    templates.push(`Protection contre le froid sans compromis sur l'allure.`);
  } else {
    templates.push(`Inter-saison maîtrisée — assez de couches pour ${temp}°, assez de style pour impressionner.`);
  }

  // Style-focused
  if (style === 'morning') {
    templates.push(`Bureau décontracté : structuré sans être rigide, élégant sans en faire trop.`);
  } else if (style === 'weekend') {
    templates.push(`Weekend mode : confort maximal, style intact. Le dress code du repos actif.`);
  } else if (style === 'evening') {
    templates.push(`Soirée casual-chic : une silhouette qui passe du bar au restaurant sans accroc.`);
  }

  // Product-type focused
  if (items.veste) {
    templates.push(`La ${items.veste.productType.toLowerCase()} ${items.veste.vendor} ancre le look — le reste suit naturellement.`);
  }
  if (items.chaussures) {
    templates.push(`Les ${items.chaussures.vendor} aux pieds donnent le ton. Le reste s'articule autour.`);
  }
  if (items.accessoire) {
    templates.push(`Touche finale avec ${items.accessoire.productType === 'Bobs' ? 'le bob' : items.accessoire.productType === 'Casquettes' ? 'la casquette' : "l'accessoire"} ${items.accessoire.vendor} — le détail qui fait la différence.`);
  }

  return pickRandom(templates);
}

// ─── Nudge Messages ─────────────────────────────────────────────────
function generateNudge(signals) {
  const { swipeRights, preferredBrands, preferredTypes, tappedSlots } = signals;
  const topBrand = Object.entries(preferredBrands).sort((a,b) => b[1] - a[1])[0];
  const topType = Object.entries(preferredTypes).sort((a,b) => b[1] - a[1])[0];
  const topSlot = tappedSlots.length > 0 ?
    Object.entries(tappedSlots.reduce((a,s) => ({...a,[s]:(a[s]||0)+1}),{})).sort((a,b)=>b[1]-a[1])[0] : null;

  const nudges = [];
  if (topBrand && topBrand[1] >= 2) {
    nudges.push(`Tu sembles aimer ${topBrand[0]} — on continue dans cette direction.`);
  }
  if (topType && topType[1] >= 2) {
    const typeNames = {
      'T-Shirt':'les t-shirts','Chemises':'les chemises','Vestes':'les vestes',
      'Pantalons':'les pantalons','Jeans':'les jeans','Sweats':'les sweats',
      'Chaussures':'les sneakers','Chaussures Norda':'les Norda'
    };
    nudges.push(`${typeNames[topType[0]] || topType[0]} reviennent souvent — on raffine dans ce sens.`);
  }
  if (topSlot && topSlot[1] >= 2) {
    const slotNames = {HAUT:'le haut',VESTE:'la veste',BAS:'le bas',CHAUSSURES:'les chaussures',ACCESSOIRE:"l'accessoire"};
    nudges.push(`${slotNames[topSlot[0]] || topSlot[0]} semble être ta pièce clé — on compose autour.`);
  }
  if (nudges.length === 0) {
    nudges.push('On apprend ton style — encore quelques swipes pour affiner.');
  }
  return pickRandom(nudges);
}

const DETAIL_QUERY = `query($handle: String!) {
  product(handle: $handle) {
    description
    images(first: 8) { edges { node { url altText } } }
  }
}`;

async function fetchProductDetail(handle) {
  try {
    const res = await fetch(STOREFRONT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': STOREFRONT_TOKEN },
      body: JSON.stringify({ query: DETAIL_QUERY, variables: { handle } })
    });
    const json = await res.json();
    if (json.data && json.data.product) {
      return {
        description: json.data.product.description || '',
        images: json.data.product.images.edges.map(e => {
          const url = e.node.url;
          return url.includes('?') ? url + '&width=600' : url + '?width=600';
        })
      };
    }
  } catch (e) { console.warn('[Detail] fetch error:', e.message); }
  return { description: '', images: [] };
}

  const weatherLabel = weather ? (WEATHER_FR[weather.code] || 'Peu nuageux') : '';

  const handleNewBundle = useCallback((direction) => {
    if (isAnimating || !catalog || !weather) return;
    setIsAnimating(true);

    // Record signals + update Thompson preferences
    setUserSignals(prev => {
      const next = { ...prev, preferences: { ...prev.preferences } };
      for (const axis of Object.keys(next.preferences)) {
        next.preferences[axis] = { ...prev.preferences[axis] };
        for (const val of Object.keys(next.preferences[axis])) {
          next.preferences[axis][val] = { ...prev.preferences[axis][val] };
        }
      }
      if (currentBundle) {
        const entry = { items: currentBundle.items, timestamp: Date.now() };
        const bundleAxes = currentRAGBundleRef.current
          ? extractRAGBundleAxes(currentRAGBundleRef.current)
          : extractBundleAxes(currentBundle);
        updatePreferences(next.preferences, bundleAxes, direction);

        if (direction === 'right') {
          next.swipeRights = [...prev.swipeRights, entry];
          Object.values(currentBundle.items).filter(Boolean).forEach(p => {
            next.preferredBrands = { ...next.preferredBrands, [p.vendor]: (next.preferredBrands[p.vendor] || 0) + 1 };
            next.preferredTypes = { ...next.preferredTypes, [p.productType]: (next.preferredTypes[p.productType] || 0) + 1 };
          });
        } else {
          next.swipeLefts = [...prev.swipeLefts, entry];
          Object.values(currentBundle.items).filter(Boolean).forEach(p => {
            next.avoidedProducts = [...prev.avoidedProducts, p.handle];
          });
        }
      }
      return next;
    });

    const exitX = direction === 'right' ? window.innerWidth : -window.innerWidth;
    setSwipeOffset(exitX);

    setTimeout(() => {
      setUserSignals(currentSignals => {
        let newBundle = null;

        if (ragDataRef.current && productMapRef.current) {
          const selected = selectRAGBundle(
            ragDataRef.current, productMapRef.current, weather,
            currentSignals.preferences, seenBundlesRef.current, direction
          );
          if (selected) {
            const resolvedItems = resolveRAGItems(selected.bundle.items, productMapRef.current);
            if (Object.values(resolvedItems).filter(Boolean).length >= 2) {
              seenBundlesRef.current.add(selected.idx);
              currentRAGBundleRef.current = selected.bundle;
              ragAlternativesRef.current = resolveRAGAlternatives(selected.bundle.alternatives, productMapRef.current);
              newBundle = { items: resolvedItems, timestamp: Date.now(), editorial: selected.bundle.editorial };
            }
          }
        }

        if (!newBundle) {
          currentRAGBundleRef.current = null;
          ragAlternativesRef.current = {};
          newBundle = composeBundle(catalog, weather, currentSignals, previousBundleRef.current, direction);
        }

        previousBundleRef.current = newBundle;
        setCurrentBundle(newBundle);
        setSwipeOffset(0);
        setEnterFrom(direction === 'right' ? -150 : 150);
        setEntering(true);
        setBundleCount(c => c + 1);
        setActiveSlot(null);
        setAlternatives(null);
        setIsScrolled(false);
        setHeroSlot(null);
        if (cardRef.current) cardRef.current.scrollTop = 0;

        setTimeout(() => {
          setEntering(false);
          setIsAnimating(false);
        }, 350);
        return currentSignals;
      });
    }, 350);
  }, [catalog, weather, currentBundle, isAnimating]);

  // Nudge effect
  useEffect(() => {
    if (bundleCount > 0 && bundleCount % 3 === 0 && bundleCount <= 30) {
      const msg = generateNudge(userSignals);
      setNudge(msg);
    }
  }, [bundleCount]);

  // Touch/mouse handlers
  // Track card scroll position
  const handleCardScroll = useCallback(() => {
    const card = cardRef.current;
    if (card) setIsScrolled(card.scrollTop > 20);
  }, []);

  const handleDragStart = useCallback((clientX, clientY) => {
    if (isAnimating) return;
    // Don't start swipe when scrolled down into details
    const card = cardRef.current;
    if (card && card.scrollTop > 20) return;
    dragRef.current = { startX: clientX, startY: clientY, dragging: true, locked: false, startTime: Date.now() };
  }, [isAnimating]);

  const handleDragMove = useCallback((clientX, clientY) => {
    if (!dragRef.current.dragging || isAnimating) return;
    const dx = clientX - dragRef.current.startX;
    const dy = clientY - dragRef.current.startY;
    // If vertical scroll is dominant, cancel horizontal drag
    if (!dragRef.current.locked) {
      if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 10) {
        dragRef.current.dragging = false;
        setSwipeOffset(0);
        return;
      }
      if (Math.abs(dx) > 10) dragRef.current.locked = true;
    }
    setSwipeOffset(dx);
  }, [isAnimating]);

  const handleDragEnd = useCallback((clientX) => {
    if (!dragRef.current.dragging || isAnimating) { dragRef.current.dragging = false; return; }
    dragRef.current.dragging = false;
    dragRef.current.locked = false;
    const dx = clientX - dragRef.current.startX;
    const elapsed = Date.now() - dragRef.current.startTime;
    // Fast swipe (velocity-based) or distance-based
    if (dx > 100 || (dx > 50 && elapsed < 300)) {
      handleNewBundle('right');
    } else if (dx < -100 || (dx < -50 && elapsed < 300)) {
      handleNewBundle('left');
    } else {
      setSwipeOffset(0);
    }
  }, [isAnimating, handleNewBundle]);

  const onTouchStart = useCallback(e => handleDragStart(e.touches[0].clientX, e.touches[0].clientY), [handleDragStart]);
  const onTouchMove = useCallback(e => handleDragMove(e.touches[0].clientX, e.touches[0].clientY), [handleDragMove]);
  const onTouchEnd = useCallback(e => handleDragEnd(e.changedTouches[0].clientX), [handleDragEnd]);
  const onMouseDown = useCallback(e => handleDragStart(e.clientX, e.clientY), [handleDragStart]);
  const onMouseMove = useCallback(e => { if (dragRef.current.dragging) handleDragMove(e.clientX); }, [handleDragMove]);
  const onMouseUp = useCallback(e => handleDragEnd(e.clientX), [handleDragEnd]);

  // Hero slot selection
  const handleHeroChange = useCallback((slot) => {
    setHeroSlot(slot);
  }, []);

  // CTA → create Shopify cart and redirect to checkout
  const handleCTA = useCallback(async () => {
    setCartLoading(true);
    const items = Object.values(currentBundle.items).filter(Boolean);
    const checkoutUrl = await createShopifyCart(items);
    setCartLoading(false);
    if (checkoutUrl) {
      window.open(checkoutUrl, '_blank');
    } else {
      // Fallback: open detail overlay
      setExpanded(true);
    }
  }, [currentBundle]);

  // Context input submit
  const [contextLoading, setContextLoading] = useState(false);
  const handleContextSubmit = useCallback(async () => {
    if (!contextInput.trim() || !catalog || !weather || contextLoading) return;
    const msg = contextInput.trim();
    setContextLoading(true);
    let geminiDirRef = null;
    try {
      const resp = await fetch('/api/gemini-isciacus', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          context: { day: dayName, time: period, temp: weather.temp, weather: weatherLabel },
          signals: { ...userSignals, userMessage: msg }
        })
      });
      if (resp.ok) {
        geminiDirRef = await resp.json();
        if (geminiDirRef.editorial) {
          setNudge(geminiDirRef.editorial);
        }
      }
    } catch (e) {
      console.warn('[Gemini] context error:', e.message);
    }
    setContextLoading(false);
    setContextInput('');
    // Recompose bundle — try RAG first, using Gemini direction to guide selection
    let newBundle = null;
    if (ragDataRef.current && productMapRef.current) {
      const selected = selectRAGBundle(
        ragDataRef.current, productMapRef.current, weather,
        userSignals.preferences, seenBundlesRef.current, 'right', geminiDirRef
      );
      if (selected) {
        const resolvedItems = resolveRAGItems(selected.bundle.items, productMapRef.current);
        if (Object.values(resolvedItems).filter(Boolean).length >= 2) {
          seenBundlesRef.current.add(selected.idx);
          currentRAGBundleRef.current = selected.bundle;
          ragAlternativesRef.current = resolveRAGAlternatives(selected.bundle.alternatives, productMapRef.current);
          newBundle = { items: resolvedItems, timestamp: Date.now(), editorial: selected.bundle.editorial };
        }
      }
    }
    if (!newBundle) {
      currentRAGBundleRef.current = null;
      ragAlternativesRef.current = {};
      newBundle = composeBundle(catalog, weather, userSignals, previousBundleRef.current, 'right');
    }
    previousBundleRef.current = newBundle;
    setCurrentBundle(newBundle);
    if (cardRef.current) cardRef.current.scrollTop = 0;
    setIsScrolled(false);
    setBundleCount(c => c + 1);
  }, [contextInput, catalog, weather, userSignals, dayName, period, weatherLabel, contextLoading]);

  if (loading) return <LoadingScreen />;
  if (!currentBundle) return <LoadingScreen />;

  const rotation = swipeOffset * 0.04;
  const opacity = Math.max(0, 1 - Math.abs(swipeOffset) / 400);
  const cardStyle = {
    transform: entering ? undefined : `translateX(${swipeOffset}px) rotate(${rotation}deg)`,
    opacity: entering ? undefined : opacity
  };

  const total = Math.round(bundleTotal(currentBundle));
  // Use RAG editorial if available, otherwise generate dynamically
  const editorial = currentBundle.editorial || generateEditorial(currentBundle, weather, style);

  const leftIndicatorOpacity = swipeOffset < -30 ? Math.min(1, (-swipeOffset - 30) / 70) : 0;
  const rightIndicatorOpacity = swipeOffset > 30 ? Math.min(1, (swipeOffset - 30) / 70) : 0;

  const itemCount = Object.values(currentBundle.items).filter(Boolean).length;

  return (
    <div className="app-container"
         onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp}>
      <div className="context-bar">
        <div className="context-left">
          <a href="recherche-concurrentielle-configurateurs-ia.tex" target="_blank"
            title="TSMA Research Paper (LaTeX)"
            style={{textDecoration:'none',color:'inherit'}}><div className="logo">ISCIACUS</div></a>
          <div className="context-line">{dayName} {period} · {weather.temp}° · Paris</div>
          <div className="context-weather">{weatherLabel}</div>
        </div>
        <div>
          <div className="look-counter">Look #{bundleCount + 1}</div>
        </div>
      </div>

      <div className="card-area">
        <div className={`bundle-card ${isAnimating && !entering ? 'animating' : ''} ${entering ? 'entering' : ''} ${isScrolled ? 'scrolled' : ''}`}
             style={entering ? {'--enter-from': enterFrom + 'px'} : cardStyle}
             ref={cardRef}
             onScroll={handleCardScroll}
             onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
             onMouseDown={onMouseDown}>

          <div className="bundle-card-inner">
            <div className="editorial-note">"{editorial}"</div>

            <HeroBundle bundle={currentBundle}
              heroSlot={heroSlot}
              onHeroChange={handleHeroChange} />

            <div className="bundle-divider"></div>

            <div className="bundle-footer">
              <div className="bundle-total">
                <div className="bundle-total-label">{itemCount} pièces</div>
                <div className="bundle-total-price">{total}€</div>
              </div>
              <div className="swipe-hint">← SWIPE →</div>
            </div>

            <div className="scroll-peek">
              <div className="scroll-peek-chevron">▼ ▼ ▼</div>
              <div className="scroll-peek-text">Détails des pièces</div>
            </div>
          </div>

          <div className="bundle-details">
            {['veste','haut','bas','chaussures','accessoire']
              .filter(slot => currentBundle.items[slot])
              .map(slot => (
                <ProductDetailCard key={slot} product={currentBundle.items[slot]}
                  slotKey={slot.toUpperCase()} />
              ))
            }
          </div>
        </div>

        {!isScrolled && (
          <>
            <div className="swipe-indicator left" style={{ opacity: leftIndicatorOpacity }}>← Autre chose</div>
            <div className="swipe-indicator right" style={{ opacity: rightIndicatorOpacity }}>J'aime →</div>
          </>
        )}

        {nudge && <NudgeToast message={nudge} onDone={() => setNudge(null)} />}
      </div>

      <div className="context-input-bar">
        {contextLoading ? (
          <div className="context-loading">
            <div className="loading-bar" style={{width:60}}><div className="loading-bar-inner"></div></div>
            <span style={{fontSize:'.75rem',color:'var(--accent)',fontStyle:'italic'}}>Je compose ton look...</span>
          </div>
        ) : (
          <div className="context-input-wrap">
            <input className="context-input" type="text" value={contextInput}
              onChange={e => setContextInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && handleContextSubmit()}
              placeholder="Un brunch dimanche, un date ce soir..." />
            <button className="context-send" onClick={handleContextSubmit}
              disabled={!contextInput.trim()}>→</button>
          </div>
        )}
      </div>

      <div className="bottom-bar">
        <button className="swipe-btn" onClick={() => handleNewBundle('left')} title="Autre look">✕</button>
        <button className="cta-button primary" onClick={handleCTA} disabled={cartLoading}>
          {cartLoading ? 'Ajout au panier...' : 'Je prends ce look'}
        </button>
        <button className="swipe-btn" onClick={() => handleNewBundle('right')} title="J'aime, encore">♥</button>
      </div>

      {expanded && <DetailOverlay bundle={currentBundle} onClose={() => setExpanded(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
