/* ═══ SOCIAL PROOF ═══ */
function socialProof(id){
  let h=0;for(let i=0;i<id.length;i++){h=((h<<5)-h)+id.charCodeAt(i);h|=0;}
  const n=Math.abs(h%25)+72;
  const labels=["des joueurs","des compétiteurs","des coachs","des clubs","des joueurs réguliers"];
  return{pct:n,label:labels[Math.abs(h>>8)%labels.length]};
}

/* ═══ SCORING ENGINE ═══
   Product vectors: [controle, puissance, maniabilite, tolerance, spin, confort, durabilite]

   Level profiles — what matters most at each level
   Style profiles — shifted by play style
   Position modifiers — droite needs control, gauche needs power
   Frequency modifiers — intensif needs durability
   Injury modifiers — shifts toward comfort and lightweight
*/

const LEVEL_PROFILES={
  debutant:     [9,2,8,10,3,10,5],
  intermediaire:[7,5,7,7,6,7,7],
  avance:       [5,8,5,4,8,5,9],
  expert:       [4,9,4,3,9,4,10],
};
const STYLE_MOD={
  controle:  [4,-2,2,2,1,2,0],
  polyvalent:[1,1,1,1,1,1,1],
  puissance: [-2,5,-1,-2,2,-2,1],
};
const POS_MOD={
  droite:   [3,-1,1,2,1,1,0],
  gauche:   [-1,3,0,-1,1,-1,0],
  "les-deux":[1,1,1,1,1,1,0],
};
const FREQ_MOD={
  occasionnel:[0,0,0,1,0,1,-2],
  regulier:   [0,0,0,0,0,0,1],
  intensif:   [0,0,0,-1,0,-1,4],
};
const INJURY_MOD={
  aucune: [0,0,0,0,0,0,0],
  coude:  [2,-3,2,3,-1,5,0],
  epaule: [2,-2,3,2,0,4,0],
  genoux: [0,0,0,0,0,2,0], /* mainly affects shoe choice */
};

const LVL_PRICE={debutant:{max:180},intermediaire:{max:300},avance:{max:450},expert:{max:999}};

function buildProfile(level,style,position,freq,injury){
  const l=LEVEL_PROFILES[level]||LEVEL_PROFILES.intermediaire;
  const s=STYLE_MOD[style]||STYLE_MOD.polyvalent;
  const p=POS_MOD[position]||POS_MOD["les-deux"];
  const f=FREQ_MOD[freq]||FREQ_MOD.regulier;
  const inj=INJURY_MOD[injury]||INJURY_MOD.aucune;
  return l.map((v,i)=>v+(s[i]||0)+(p[i]||0)+(f[i]||0)+(inj[i]||0));
}

function scoreProduct(product,profile,level){
  const sc=product.sc;
  let score=0;
  for(let i=0;i<7;i++){
    if(sc[i]===0) continue; /* skip irrelevant axes (e.g. spin for shoes) */
    const diff=Math.abs(profile[i]-sc[i]);
    score+=(10-diff)*Math.max(0.5,profile[i]/5);
  }
  /* Level alignment bonus */
  if(product.level){
    const lvlOrder=["debutant","intermediaire","avance","expert"];
    const pLvl=lvlOrder.indexOf(product.level);
    const uLvl=lvlOrder.indexOf(level);
    const dist=Math.abs(pLvl-uLvl);
    if(dist===0) score+=8;
    else if(dist===1) score+=3;
    else score-=5;
  }
  return score;
}

function getRecs(level,style,position,freq,injury,gen,budgetMax){
  const g=gen||"h";
  const bMax=budgetMax||LVL_PRICE[level]?.max||400;
  const profile=buildProfile(level,style,position,freq,injury);

  /* Raquette recommendation */
  const raquettes=P.raquette
    .map(p=>({...p,_score:scoreProduct(p,profile,level)}))
    .sort((a,b)=>b._score-a._score);
  const raqInBudget=raquettes.filter(p=>p.price<=bMax);
  const raqPick=raqInBudget.length>0?raqInBudget[0]:raquettes[0];

  /* Chaussure recommendation */
  const chaussures=P.chaussure
    .map(p=>({...p,_score:scoreProduct(p,profile,level)}))
    .sort((a,b)=>b._score-a._score);
  const chPick=chaussures[0];

  /* Smart accessory picks based on profile */
  const accPicks=[];
  /* Always recommend balls */
  accPicks.push(P.accessoire.find(a=>a.type==="Balles"));
  /* Always recommend surgrip */
  accPicks.push(P.accessoire.find(a=>a.type==="Surgrip"));
  /* Regulier+ → sac */
  if(["regulier","intensif"].includes(freq)){
    accPicks.push(P.accessoire.find(a=>a.type==="Sac"));
  }
  /* Occasionnel → housse */
  if(freq==="occasionnel"){
    accPicks.push(P.accessoire.find(a=>a.type==="Housse"));
  }

  const categories=[
    {cat:"raquette",label:"RAQUETTE",name:"Votre arme",pick:raqPick},
    {cat:"chaussure",label:"CHAUSSURES",name:"Vos appuis",pick:chPick},
  ];

  const results=categories.map(c=>({
    ...c.pick,
    catLabel:c.label,
    catName:c.name,
    cat:c.cat,
    _matchPct:Math.round(Math.min(100,c.pick._score*1.2)),
  }));

  return{main:results,accessories:accPicks.filter(Boolean)};
}

  /* ═══ GEMINI TEXT MODE ═══ */
  const heuristicFallback=(userMsg)=>{
    const msg=userMsg.toLowerCase();
    const profile={level:"intermediaire",style:"polyvalent",position:"les-deux",freq:"regulier",injury:"aucune",tags:[],summary:""};
    if(msg.match(/débute|commence|nouveau|premier/)){profile.level="debutant";profile.tags.push("debutant","confort","tolerant","progression");}
    else if(msg.match(/compét|tournoi|classé|expert/)){profile.level="expert";profile.tags.push("expert","pro","competition");}
    else if(msg.match(/avanc|3.ans|4.ans|5.ans/)){profile.level="avance";profile.tags.push("avance","competition");}
    else profile.tags.push("intermediaire","polyvalent");
    if(msg.match(/smash|attaqu|puissan|offensi/)){profile.style="puissance";profile.tags.push("puissance","attaque","smash","explosif");}
    else if(msg.match(/contrôle|control|défens|patient|placement/)){profile.style="controle";profile.tags.push("controle","defense","placement","patience");}
    else profile.tags.push("polyvalent","equilibre");
    if(msg.match(/droit/)) profile.position="droite";
    else if(msg.match(/gauch/)) profile.position="gauche";
    if(msg.match(/occasion|1.fois|rarement/)) profile.freq="occasionnel";
    else if(msg.match(/intensi|tous.les.jours|3.fois|4.fois/)){profile.freq="intensif";profile.tags.push("intensif","durable");}
    if(msg.match(/coude|tennis.elbow|avant.bras/)){profile.injury="coude";profile.tags.push("confort","anti-vibration");}
    else if(msg.match(/épaule|poignet/)){profile.injury="epaule";profile.tags.push("leger","confort");}
    else if(msg.match(/genou|chevill/)){profile.injury="genoux";profile.tags.push("amorti","protection","genoux");}
    if(msg.match(/leger|léger|light/)) profile.tags.push("leger");
    if(msg.match(/confort/)) profile.tags.push("confort");
    if(msg.match(/spin|effet/)) profile.tags.push("spin","effet");
    profile.tags=[...new Set(profile.tags)];
    profile.summary="Profil détecté : "+LEVELS.find(l=>l.id===profile.level)?.label+" · "+STYLES.find(s=>s.id===profile.style)?.label;
    return profile;
  };

  const sendToGemini=async(userMsg,currentProfile)=>{
    /* Try API first, fallback to heuristic */
    try{
      const body={message:userMsg};
      if(currentProfile) body.currentProfile=currentProfile;
      const resp=await fetch(WORKER_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
      if(resp.ok){const data=await resp.json();if(data.level) return data;}
    }catch(e){}
    /* Fallback heuristique si API indisponible */
    return heuristicFallback(userMsg);
  };

  const handleTextSubmit=async()=>{
    if(!chatInput.trim())return;
    const userMsg=chatInput.trim();
    setChatInput("");
    setChatMsgs(prev=>[...prev,{role:"user",text:userMsg}]);
    setChatLoading(true);
    const profile=await sendToGemini(userMsg);
    setChatLoading(false);
    if(profile){
      setChatMsgs(prev=>[...prev,{role:"ai",text:profile.summary||"Profil analysé. Voici votre setup."}]);
      if(profile.level) setLevel(profile.level);
      if(profile.style) setStyle(profile.style);
      if(profile.position) setPosition(profile.position);
      if(profile.freq) setFreq(profile.freq);
      if(profile.injury) setInjury(profile.injury);
      setTimeout(()=>{
        const l=profile.level||"intermediaire";
        const s=profile.style||"polyvalent";
        const p=profile.position||"les-deux";
        const f=profile.freq||"regulier";
        const inj=profile.injury||"aucune";
        setPh("an");
        setTimeout(()=>{
          const r=getRecs(l,s,p,f,inj,gen,budgetMax);
          setRes(r);setPh("res");
        },2200);
      },1500);
    }
  };

  /* ═══ REFINE — conversation in results page ═══ */
  const handleRefine=async()=>{
    if(!chatInput.trim())return;
    const userMsg=chatInput.trim();
    setChatInput("");
    setChatMsgs(prev=>[...prev,{role:"user",text:userMsg}]);
    setChatLoading(true);
    const currentProfile={level,style,position,freq,injury};
    const profile=await sendToGemini(userMsg,currentProfile);
    setChatLoading(false);
    if(profile){
      setChatMsgs(prev=>[...prev,{role:"ai",text:profile.summary||"Setup mis à jour."}]);
      const l=profile.level||level;
      const s=profile.style||style;
      const p=profile.position||position;
      const f=profile.freq||freq;
      const inj=profile.injury||injury;
      setLevel(l);setStyle(s);setPosition(p);setFreq(f);setInjury(inj);
      const r=getRecs(l,s,p,f,inj,gen,budgetMax);
      setRes(r);
    }
  };

  /* "Me conseiller" smart defaults */
  const adviseMe=(step)=>{
    if(step==="level"){setLevel("intermediaire");setPh("style");}
    else if(step==="style"){setStyle("polyvalent");setPh("position");}
    else if(step==="position"){setPosition("les-deux");setPh("frequency");}
  };

  /* ═══ ATTENTIONAL FEED — Catalogue intelligent ═══ */
  const [feedInterests,setFeedInterests]=useState([]);
  const [feedNudgeMap,setFeedNudgeMap]=useState({});
  const [feedChatInput,setFeedChatInput]=useState("");
  const [feedChatMsgs,setFeedChatMsgs]=useState([]);
  const [feedProfile,setFeedProfile]=useState(null);
  const [feedChatLoading,setFeedChatLoading]=useState(false);
  const [feedExpanded,setFeedExpanded]=useState(null);
  const [feedCatBoost,setFeedCatBoost]=useState(null);
  const [lockedFeedOrder,setLockedFeedOrder]=useState(null);

  const allProducts=useMemo(()=>[
    ...P.raquette.map(p=>({...p,cat:"raquette",catLabel:"RAQUETTE"})),
    ...P.chaussure.map(p=>({...p,cat:"chaussure",catLabel:"CHAUSSURES"})),
    ...P.accessoire.map(p=>({...p,cat:"accessoire",catLabel:"ACCESSOIRE"})),
  ],[]);

  /* Interleave categories for variety in default order */
  const defaultFeedOrder=useMemo(()=>{
    const bycat={};
    allProducts.forEach(p=>{(bycat[p.cat]=bycat[p.cat]||[]).push(p);});
    const cats=Object.keys(bycat);
    const result=[];
    const maxLen=Math.max(...cats.map(c=>bycat[c].length));
    for(let i=0;i<maxLen;i++) cats.forEach(c=>{if(bycat[c][i]) result.push(bycat[c][i]);});
    return result;
  },[allProducts]);

  /* Score products by affinity to interests + profile.
     catBoost is DOMINANT: +100 for matching category, -50 for non-matching.
     This ensures "chaussure" search always shows shoes first. */
  const scoreAllProducts=(products,interests,profile,catBoost)=>{
    return products.map(p=>{
      let aff=0;
      /* Category boost is dominant when user explicitly searched a category */
      if(catBoost&&p.cat===catBoost) aff+=100;
      else if(catBoost&&p.cat!==catBoost) aff-=50;
      /* Tap-based interest signals */
      interests.forEach(int=>{
        if(int.brand===p.brand) aff+=3;
        if(int.cat===p.cat) aff+=1;
        if(Math.abs(int.price-p.price)<40) aff+=2;
        if(p.sc&&int.sc) aff+=p.sc.reduce((s,v,i)=>s+v*(int.sc[i]||0),0)/80;
      });
      /* Profile scoring — only when NO catBoost (otherwise it overrides) */
      if(!catBoost&&profile&&p.sc){
        try{
          const prof=buildProfile(profile.level||"intermediaire",profile.style||"polyvalent",profile.position||"les-deux",profile.freq||"regulier",profile.injury||"aucune");
          aff+=scoreProduct(p,prof,profile.level||"intermediaire")*2;
        }catch(e){}
      }
      /* Tag matching — profile tags ↔ product tags */
      if(profile&&profile.tags&&p.tags){
        const matches=profile.tags.filter(t=>p.tags.includes(t)).length;
        aff+=matches*5;
      }
      return{...p,_affinity:aff};
    });
  };

  const getFeedOrder=()=>lockedFeedOrder||defaultFeedOrder;

  /* Generate contextual nudge for a product based on browsing interests */
  const generateFeedNudge=(product,interests)=>{
    if(interests.length===0) return null;
    const last=interests[interests.length-1];
    if(last.id===product.id) return null;
    if(last.brand===product.brand) return `Vous explorez ${product.brand}. ${product.name} ${product.cat===last.cat?"offre un profil différent":"complète votre setup"}.`;
    if(last.cat===product.cat&&Math.abs(last.price-product.price)<50) return `Même gamme que le ${last.name} — ${product.price<last.price?"plus accessible":"profil plus technique"}.`;
    if(product.sc&&last.sc){
      const dot=product.sc.reduce((s,v,i)=>s+v*(last.sc[i]||0),0);
      if(dot>350) return `Profil technique similaire au ${last.name}. Les joueurs qui aiment l'un choisissent souvent l'autre.`;
    }
    if(last.cat!==product.cat) return `Pour compléter — ${(product.catLabel||product.cat||"").toLowerCase()} adaptées à votre profil.`;
    return null;
  };

  /* On tap (expand card) → register interest + reorder items BELOW */
  const onCardTap=(product,cardIndex)=>{
    const isClosing=feedExpanded===product.id;
    setFeedExpanded(isClosing?null:product.id);
    /* Only register interest on open, not close */
    if(isClosing) return;
    const interest={id:product.id,brand:product.brand,price:product.price,cat:product.cat,name:product.name,sc:product.sc};
    setFeedInterests(prev=>{
      if(prev.find(x=>x.id===product.id)) return prev;
      return[...prev,interest];
    });
    /* Reorder only products below this one */
    const currentOrder=lockedFeedOrder||defaultFeedOrder;
    const newInterests=[...feedInterests.filter(x=>x.id!==product.id),interest];
    const frozen=currentOrder.slice(0,cardIndex+1);
    const tail=currentOrder.slice(cardIndex+1);
    const scored=scoreAllProducts(tail,newInterests,feedProfile,feedCatBoost);
    scored.sort((a,b)=>b._affinity-a._affinity);
    setLockedFeedOrder([...frozen,...scored]);
  };


  /* Update nudge map when interests change */
  useEffect(()=>{
    if(feedInterests.length===0) return;
    const newNudges={};
    allProducts.forEach(p=>{
      const nudge=generateFeedNudge(p,feedInterests);
      if(nudge) newNudges[p.id]=nudge;
    });
    setFeedNudgeMap(newNudges);
  },[feedInterests,allProducts]);

  /* Scroll to feed when profile is set via conversation */
  useEffect(()=>{
    if(feedProfile) document.getElementById("attentional-feed")?.scrollIntoView({behavior:"smooth"});
  },[feedProfile]);

  /* Recompute full feed order on chat actions (profile/catBoost).
     Uses allProducts as base to avoid referencing lockedFeedOrder (prevents loop). */
  useEffect(()=>{
    if(feedProfile||feedCatBoost){
      const scored=scoreAllProducts(allProducts,feedInterests,feedProfile,feedCatBoost);
      scored.sort((a,b)=>b._affinity-a._affinity);
      setLockedFeedOrder(scored);
    }
  },[feedProfile,feedCatBoost]);

  /* Handle conversational input in the feed */
  const handleFeedChat=async()=>{
    if(!feedChatInput.trim()) return;
    const msg=feedChatInput.trim();
    setFeedChatInput("");
    setFeedChatMsgs(prev=>[...prev,{role:"user",text:msg}]);
    setFeedChatLoading(true);
    /* Detect product category keywords locally */
    const lower=msg.toLowerCase();
    let detectedCat=null;
    const catLabels={chaussure:"chaussures",raquette:"raquettes",accessoire:"accessoires"};
    if(lower.match(/chaussur|shoe|sprint|appui|semelle/)) detectedCat="chaussure";
    else if(lower.match(/raquette|racket|pala|raq/)) detectedCat="raquette";
    else if(lower.match(/access|sac|balle|surgrip|housse|grip|protect/)) detectedCat="accessoire";
    setFeedCatBoost(detectedCat);
    /* If pure category search, skip Gemini — instant reorder + feedback message */
    if(detectedCat){
      const count=allProducts.filter(p=>p.cat===detectedCat).length;
      setFeedChatMsgs(prev=>[...prev,{role:"ai",text:`J'ai réorganisé le catalogue pour mettre en avant les ${catLabels[detectedCat]}. ${count} produits correspondent — scrollez pour explorer.`}]);
      setFeedChatLoading(false);
      return;
    }
    /* Otherwise, ask Gemini for player profile */
    const profile=await sendToGemini(msg);
    setFeedChatLoading(false);
    if(profile){
      setFeedProfile(profile);
      const tagStr=profile.tags&&profile.tags.length>0?` Tags détectés : ${profile.tags.slice(0,5).join(", ")}.`:"";
      setFeedChatMsgs(prev=>[...prev,{role:"ai",text:(profile.summary||"Profil analysé.")+tagStr+" Le catalogue s'adapte à votre profil."}]);
    }
  };

  const sn={gender:1,level:2,style:3,position:4,frequency:5,injury:6}[ph]||0;
  const totalSteps=6;

  const Btn=({label,emoji,sub,onClick,wide})=>{const[h,setH]=useState(false);return<button onClick={onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{background:h?"rgba(255,255,255,0.06)":"rgba(255,255,255,0.015)",border:h?"1px solid rgba(255,255,255,0.2)":"1px solid rgba(255,255,255,0.05)",padding:wide?"16px 18px":"20px 14px",cursor:"pointer",display:"flex",flexDirection:wide?"row":"column",alignItems:wide?"center":"center",gap:wide?12:6,transition:"all 0.25s",position:"relative",overflow:"hidden",width:"100%"}}><div style={{position:"absolute",bottom:0,left:0,height:2,background:T.acc2,width:h?"100%":"0%",transition:"width 0.35s"}}/>{emoji&&<span style={{fontSize:wide?20:24}}>{emoji}</span>}<div style={{textAlign:wide?"left":"center"}}><div style={{fontFamily:T.bf,fontSize:13,fontWeight:500,color:T.white}}>{label}</div>{sub&&<div style={{fontFamily:T.bf,fontSize:10,fontWeight:300,color:T.grey,marginTop:2}}>{sub}</div>}</div></button>;};

  /* Sliders */
  const Sliders=()=><div style={{display:"flex",flexDirection:"column",gap:14,marginBottom:16,padding:"14px",background:"rgba(255,255,255,0.015)",border:"1px solid rgba(255,255,255,0.04)"}}>
    <div style={{fontFamily:T.bf,fontSize:8,letterSpacing:"2.5px",textTransform:"uppercase",color:T.acc2}}>Ajuster le budget</div>
    <div>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
        <span style={{fontFamily:T.bf,fontSize:10,color:T.grey}}>Budget max raquette</span>
        <span style={{fontFamily:T.bf,fontSize:11,color:T.white,fontWeight:600}}>{budgetMax}€</span>
      </div>
      <input type="range" min="80" max="500" step="10" value={budgetMax} onChange={e=>{const v=parseInt(e.target.value);setBudgetMax(v);if(res){const r=getRecs(level,style,position,freq,injury,gen,v);setRes(r);}}}/>
    </div>
  </div>;

  const total=res?res.main.reduce((s,p)=>s+p.price,0)+res.accessories.reduce((s,a)=>s+a.price,0):0;

  return(
    <div style={{minHeight:"100vh",background:T.black,color:T.white,fontFamily:T.bf,maxWidth:900,margin:"0 auto"}}>

      {/* NUDGE */}
      {ndg&&<div style={{position:"fixed",bottom:76,left:12,right:12,maxWidth:876,margin:"0 auto",zIndex:999,background:"rgba(232,168,56,0.1)",backdropFilter:"blur(16px)",border:"1px solid rgba(232,168,56,0.2)",padding:"12px 16px",display:"flex",alignItems:"center",gap:10,animation:"nudgeIn 0.4s",borderRadius:4}}>
        <span style={{fontSize:16,flexShrink:0}}>🎾</span>
        <p style={{fontFamily:T.bf,fontSize:12,fontWeight:300,color:T.light,lineHeight:1.5,flex:1}}>{ndg}</p>

        <div onClick={reset} style={{cursor:"pointer"}}><div style={{fontFamily:T.bf,fontSize:"clamp(14px,2.5vw,18px)",fontWeight:700,letterSpacing:"3px",color:T.acc2}}>ESPRIT PADEL</div><div style={{fontFamily:T.bf,fontSize:7,letterSpacing:"2.5px",color:T.grey,textTransform:"uppercase"}}>Shop — Configurateur IA</div></div>
        {!["hero","an"].includes(ph)&&<button onClick={reset} style={{background:"none",border:"1px solid rgba(255,255,255,0.1)",padding:"5px 14px",color:T.grey,fontSize:9,fontFamily:T.bf,letterSpacing:"2px",textTransform:"uppercase",cursor:"pointer"}}>Recommencer</button>}
      </header>

      {/* HERO */}
      {ph==="hero"&&<div style={{minHeight:"85vh",display:"flex",flexDirection:"column",justifyContent:"flex-end",padding:"0 clamp(16px,4vw,40px) 80px",position:"relative",background:"linear-gradient(135deg,#1a1200 0%,#0a0a0a 40%,#0a1520 100%)"}}>
        <div style={{position:"absolute",inset:0,backgroundImage:"url(https://images.unsplash.com/photo-1646649853703-7645147474ba?w=1600&h=900&fit=crop)",backgroundSize:"cover",backgroundPosition:"center 40%",filter:"brightness(0.25) contrast(1.1)"}}/>
        <div style={{position:"absolute",inset:0,background:"linear-gradient(to top,rgba(10,10,10,1) 0%,rgba(10,10,10,0.4) 50%,rgba(10,10,10,0.1) 100%)"}}/>
        <div style={{position:"relative",zIndex:2,animation:"fadeUp 0.8s ease 0.2s both",maxWidth:560}}>
          <div style={{fontFamily:T.bf,fontSize:"clamp(8px,1.5vw,10px)",letterSpacing:"5px",textTransform:"uppercase",color:T.acc2,marginBottom:14}}>Configurateur intelligent</div>
          <h1 style={{fontFamily:T.df,fontSize:"clamp(30px,6vw,56px)",fontWeight:300,lineHeight:1.05,marginBottom:16,fontStyle:"italic"}}>Votre équipement padel,<br/><span style={{fontWeight:700,fontStyle:"normal"}}>pensé pour votre jeu</span></h1>
          <p style={{fontFamily:T.bf,fontSize:"clamp(12px,1.8vw,14px)",fontWeight:300,color:T.grey,lineHeight:1.7,maxWidth:420,marginBottom:28}}>6 questions, 30 secondes. Notre moteur analyse votre profil — niveau, style, position, fréquence, sensibilités — et compose votre setup idéal parmi 600+ références.</p>
          <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
            <button onClick={()=>setPh("gender")} style={{background:T.acc2,color:T.black,border:"none",padding:"clamp(12px,2vw,16px) clamp(30px,5vw,48px)",fontFamily:T.bf,fontSize:"clamp(11px,1.5vw,13px)",fontWeight:600,letterSpacing:"3px",textTransform:"uppercase",cursor:"pointer",transition:"background 0.3s"}} onMouseEnter={e=>e.target.style.background=T.acc} onMouseLeave={e=>e.target.style.background=T.acc2}>Trouvez mon setup</button>
            <button onClick={()=>document.getElementById("attentional-feed")?.scrollIntoView({behavior:"smooth"})} style={{background:"transparent",color:T.white,border:"1px solid rgba(255,255,255,0.2)",padding:"clamp(12px,2vw,16px) clamp(24px,4vw,36px)",fontFamily:T.bf,fontSize:"clamp(10px,1.3vw,12px)",fontWeight:400,letterSpacing:"2px",textTransform:"uppercase",cursor:"pointer",transition:"all 0.3s"}} onMouseEnter={e=>{e.target.style.borderColor="rgba(232,168,56,0.5)";e.target.style.color=T.acc2;}} onMouseLeave={e=>{e.target.style.borderColor="rgba(255,255,255,0.2)";e.target.style.color=T.white;}}>Explorer le catalogue</button>
          </div>
          <div style={{marginTop:32,display:"flex",gap:"clamp(16px,3vw,28px)",flexWrap:"wrap",animation:"fadeUp 0.8s ease 0.6s both"}}>{[{n:"600+",l:"Raquettes"},{n:"50+",l:"Marques"},{n:"#1",l:"France"},{n:"⭐",l:"Expert conseil"}].map((s,i)=><div key={i}><div style={{fontFamily:T.df,fontSize:"clamp(15px,2vw,18px)",fontWeight:600,color:T.acc2}}>{s.n}</div><div style={{fontFamily:T.bf,fontSize:8,letterSpacing:"1.5px",color:T.grey,textTransform:"uppercase",marginTop:2}}>{s.l}</div></div>)}</div>
        </div>
      </div>}

      {/* ═══ ATTENTIONAL FEED — directly below hero ═══ */}
      {ph==="hero"&&<div id="attentional-feed" style={{padding:"0 clamp(16px,4vw,32px) 120px"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,margin:"0 0 20px",paddingTop:8}}>
          <div style={{flex:1,height:1,background:"rgba(255,255,255,0.06)"}}/>
          <span style={{fontFamily:T.bf,fontSize:9,letterSpacing:"3px",textTransform:"uppercase",color:T.grey}}>Explorez</span>
          <div style={{flex:1,height:1,background:"rgba(255,255,255,0.06)"}}/>
        </div>
        <p style={{textAlign:"center",fontFamily:T.bf,fontSize:11,color:"rgba(255,255,255,0.3)",marginBottom:24,fontWeight:300}}>Scrollez. L'IA observe, apprend, s'adapte.</p>

        {feedInterests.length>0&&<div style={{textAlign:"center",marginBottom:20,animation:"fadeIn 0.5s"}}>
          <span style={{fontFamily:T.bf,fontSize:10,color:T.acc2,letterSpacing:"1px"}}>{feedInterests.length} centre{feedInterests.length>1?"s":""} d'intérêt détecté{feedInterests.length>1?"s":""}</span>
          {feedProfile&&<span style={{fontFamily:T.bf,fontSize:10,color:T.grey,marginLeft:8}}>· Profil affiné par l'IA</span>}
        </div>}

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(min(100%,340px),1fr))",gap:20}}>
          {getFeedOrder().map((p,i)=>{
            const isInterested=feedInterests.find(x=>x.id===p.id);
            const nudge=feedNudgeMap[p.id];
            const highAffinity=(p._affinity||0)>5;
            const hasSpecs=!!(p.forme||p.tech);
            const isOpen=feedExpanded===p.id;
            return <div key={p.id} style={{animation:"fadeUp 0.4s ease "+(Math.min(i,6)*0.06)+"s both"}}>
              {/* Card with tap-to-expand overlay */}
              <div data-feed-id={p.id} onClick={(e)=>{e.preventDefault();onCardTap(p,i);}} style={{position:"relative",overflow:"hidden",aspectRatio:"3/4",cursor:"pointer",...(isInterested?{animation:"dwellGlow 0.6s ease forwards"}:{})}}>
                <img src={p.img} alt={p.name} loading="lazy" onError={e=>{e.target.style.display="none";}} style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}}/>
                <div style={{position:"absolute",top:8,left:8,background:"rgba(10,10,10,0.82)",padding:"4px 10px",zIndex:3}}><span style={{fontFamily:T.bf,fontSize:8,fontWeight:600,letterSpacing:"1.5px",color:T.acc2}}>{p.catLabel}</span></div>
                {highAffinity&&<div style={{position:"absolute",top:8,right:8,background:"rgba(232,168,56,0.92)",padding:"4px 10px",zIndex:3,animation:"fadeIn 0.4s"}}><span style={{fontFamily:T.bf,fontSize:8,fontWeight:700,color:"#0a0a0a"}}>Pour vous</span></div>}

                {/* Bottom info — hidden when expanded */}
                <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"60px 16px 16px",background:"linear-gradient(transparent,rgba(10,10,10,0.9))",zIndex:2,opacity:isOpen?0:1,transition:"opacity 0.3s"}}>
                  <div style={{fontFamily:T.bf,fontSize:9,color:T.acc2,marginBottom:4,letterSpacing:"1px"}}>{p.brand}</div>
                  <div style={{fontFamily:T.df,fontSize:"clamp(18px,3.5vw,24px)",fontWeight:700,lineHeight:1.15,marginBottom:6}}>{p.name}</div>
                  <div style={{display:"flex",alignItems:"baseline",gap:10}}>
                    <span style={{fontFamily:T.bf,fontSize:"clamp(14px,2.5vw,18px)",fontWeight:600}}>{p.price} €</span>
                    {p.forme&&<span style={{fontFamily:T.bf,fontSize:9,color:T.grey}}>{p.forme} · {p.poids}</span>}
                  </div>
                  <div style={{fontFamily:T.bf,fontSize:8,color:"rgba(255,255,255,0.35)",marginTop:8,letterSpacing:"1px"}}>TAP POUR DÉTAILS</div>
                </div>

                {/* Detail overlay — appears on tap */}
                <div className={"feed-overlay"+(isOpen?" active":"")} style={{zIndex:4,background:"rgba(10,10,10,0.88)",backdropFilter:"blur(12px)",display:"flex",flexDirection:"column",justifyContent:"flex-end",padding:"16px",overflowY:"auto"}}>
                  <div style={{fontFamily:T.bf,fontSize:9,color:T.acc2,marginBottom:4,letterSpacing:"1px"}}>{p.brand}</div>
                  <div style={{fontFamily:T.df,fontSize:"clamp(16px,3vw,20px)",fontWeight:700,lineHeight:1.15,marginBottom:10}}>{p.name} — {p.price}€</div>
                  {hasSpecs&&p.forme&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"1px",marginBottom:10,background:"rgba(255,255,255,0.06)"}}>
                    {[["Forme",p.forme],["Poids",p.poids],["Mousse",p.mousse],["Surface",p.surface],["Balance",p.balance],["Texture",p.texture]].filter(([,v])=>v).map(([k,v])=><div key={k} style={{padding:"6px 8px",background:"rgba(10,10,10,0.5)"}}><div style={{fontFamily:T.bf,fontSize:6,letterSpacing:"1.5px",textTransform:"uppercase",color:T.grey,marginBottom:1}}>{k}</div><div style={{fontFamily:T.bf,fontSize:11,color:T.white,fontWeight:500}}>{v}</div></div>)}
                  </div>}
                  {p.tech&&<div style={{padding:"6px 10px",background:"rgba(232,168,56,0.06)",borderLeft:"2px solid "+T.acc2,marginBottom:10}}>
                    <p style={{fontFamily:T.bf,fontSize:10,color:T.light,lineHeight:1.4}}>{p.tech}</p>
                  </div>}
                  {(p.why||p.type)&&<p style={{fontFamily:T.bf,fontSize:10,color:"rgba(255,255,255,0.5)",lineHeight:1.4,marginBottom:10,fontWeight:300}}>{p.why||(p.type+" — "+p.brand+" "+p.name)}</p>}
                  <a href={p.url||"#"} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{display:"block",padding:"10px",background:T.acc2,color:T.black,fontFamily:T.bf,fontSize:10,fontWeight:600,letterSpacing:"1.5px",textTransform:"uppercase",textAlign:"center",textDecoration:"none",transition:"background 0.3s"}} onMouseEnter={e=>e.target.style.background=T.acc} onMouseLeave={e=>e.target.style.background=T.acc2}>Voir sur le site — {p.price}€</a>
                  <div style={{textAlign:"center",marginTop:8,fontFamily:T.bf,fontSize:8,color:"rgba(255,255,255,0.3)",letterSpacing:"1px"}}>TAP POUR FERMER</div>
                </div>

                {isInterested&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:2,background:T.acc2,zIndex:5,animation:"fadeIn 0.5s"}}/>}
              </div>
              {/* AI nudge — below the card */}
              {nudge&&!isOpen&&<div style={{padding:"10px 14px",background:"rgba(232,168,56,0.04)",borderLeft:"2px solid "+T.acc2,animation:"feedReveal 0.4s ease both",overflow:"hidden",marginTop:2}}>
                <p style={{fontFamily:T.bf,fontSize:11,color:T.light,lineHeight:1.5,fontWeight:300}}>{nudge}</p>
              </div>}
            </div>;
          })}
        </div>

        <div style={{textAlign:"center",marginTop:32}}>
          <button onClick={()=>setPh("gender")} style={{padding:"14px 36px",background:T.acc2,color:T.black,border:"none",fontFamily:T.bf,fontSize:11,fontWeight:600,letterSpacing:"2px",textTransform:"uppercase",cursor:"pointer",transition:"background 0.3s"}} onMouseEnter={e=>e.target.style.background=T.acc} onMouseLeave={e=>e.target.style.background=T.acc2}>Ou configurez votre setup en 30s</button>
        </div>
      </div>}

      {/* ═══ UNIVERSAL FLOATING CHAT — adapts to context ═══ */}
      {ph!=="an"&&(()=>{
        const isHero=ph==="hero";
        const isStep=["gender","level","style","position","frequency","injury"].includes(ph);
        const isRes=ph==="res";
        const inputVal=isHero?feedChatInput:chatInput;
        const setInputVal=isHero?setFeedChatInput:setChatInput;
        const loading=isHero?feedChatLoading:chatLoading;
        const onSubmit=isHero?handleFeedChat:isStep?handleTextSubmit:handleRefine;
        const placeholder=isHero
          ?"Décrivez ce que vous cherchez : raquette légère, chaussures terrain dur..."
          :isStep
          ?"Décrivez votre jeu : je débute, plutôt défensif, j'ai mal au coude..."
          :"Affinez : plus léger, moins cher, j'ai aussi mal au genou...";
        const statusText=isHero
          ?(loading?"Analyse en cours...":feedInterests.length>0?`${feedInterests.length} intérêt${feedInterests.length>1?"s":""} détecté${feedInterests.length>1?"s":""} · L'IA adapte le catalogue`:"L'IA adapte le catalogue en temps réel")
          :isStep
          ?(loading?"Analyse de votre profil...":"ou décrivez votre jeu librement — l'IA analyse et configure votre setup")
          :(loading?"Mise à jour du setup...":`${LEVELS.find(l=>l.id===level)?.label||""} · ${STYLES.find(s=>s.id===style)?.label||""} · Affinez votre setup en conversant`);

        return <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:50,background:"rgba(10,10,10,0.92)",backdropFilter:"blur(16px)",borderTop:"1px solid rgba(255,255,255,0.06)",padding:"8px clamp(16px,4vw,32px) 12px"}}>
          <div style={{maxWidth:900,margin:"0 auto"}}>
            {/* Chat messages — last 3, compact */}
            {(()=>{const msgs=isHero?feedChatMsgs:chatMsgs;return msgs.length>0&&<div style={{maxHeight:100,overflowY:"auto",marginBottom:6}}>
              {msgs.slice(-3).map((m,i)=><div key={i} style={{marginBottom:4,display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                <div style={{maxWidth:"80%",padding:"4px 8px",background:m.role==="user"?"rgba(232,168,56,0.1)":"rgba(255,255,255,0.03)",border:m.role==="user"?"1px solid rgba(232,168,56,0.12)":"1px solid rgba(255,255,255,0.04)",borderRadius:m.role==="user"?"6px 6px 2px 6px":"6px 6px 6px 2px"}}>
                  <p style={{fontFamily:T.bf,fontSize:10,color:m.role==="user"?T.light:T.acc2,lineHeight:1.3}}>{m.text}</p>
                </div>
              </div>)}
            </div>;})()}
            <div style={{fontFamily:T.bf,fontSize:7,letterSpacing:"2px",textTransform:"uppercase",color:T.grey,marginBottom:5,textAlign:"center"}}>{statusText}</div>
            <div style={{display:"flex",gap:8}}>
              <input value={inputVal} onChange={e=>setInputVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&inputVal.trim())onSubmit();}} placeholder={placeholder} style={{flex:1,padding:"10px 14px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",color:T.white,fontFamily:T.bf,fontSize:12,outline:"none",transition:"border 0.3s"}} onFocus={e=>e.target.style.borderColor="rgba(232,168,56,0.3)"} onBlur={e=>e.target.style.borderColor="rgba(255,255,255,0.08)"}/>
              <button onClick={onSubmit} disabled={loading||!inputVal.trim()} style={{padding:"10px 16px",background:inputVal.trim()?T.acc2:"rgba(255,255,255,0.05)",color:inputVal.trim()?T.black:T.grey,border:"none",fontFamily:T.bf,fontSize:11,fontWeight:600,cursor:inputVal.trim()?"pointer":"default",transition:"all 0.3s"}}>→</button>
            </div>
          </div>
        </div>;
      })()}

      {/* STEPS */}
      {["gender","level","style","position","frequency","injury"].includes(ph)&&<div style={{minHeight:"100vh",display:"flex",flexDirection:"column",justifyContent:"center",padding:"76px clamp(16px,4vw,40px) 100px",animation:"fadeIn 0.4s"}}>
        <div style={{display:"flex",gap:3,marginBottom:36,maxWidth:totalSteps*30}}>{Array.from({length:totalSteps},(_,i)=>i+1).map(i=><div key={i} style={{height:2,flex:1,background:i<=sn?T.acc2:"rgba(255,255,255,0.08)",transition:"background 0.3s"}}/>)}</div>
        <div style={{marginBottom:28,animation:"slideR 0.4s"}}>

            {ph==="position"&&<span>Votre <b>côté préféré ?</b></span>}
            {ph==="frequency"&&<span>À quelle <b>fréquence ?</b></span>}
            {ph==="injury"&&<span>Des <b>sensibilités</b> physiques ?</span>}

              <div style={{fontFamily:T.df,fontSize:"clamp(14px,2.5vw,18px)",fontWeight:700,color:T.acc2}}>{s.v}</div>
              <div style={{fontFamily:T.bf,fontSize:7,letterSpacing:"1px",color:T.grey,marginTop:2,textTransform:"uppercase"}}>{s.l}</div>
            </div>)}
          </div>
          <div style={{padding:"10px 12px",background:"rgba(255,255,255,0.02)",borderLeft:"3px solid "+T.acc2,marginBottom:12}}>
            <p style={{fontFamily:T.bf,fontSize:11,color:T.light,lineHeight:1.5}}>
              {style==="puissance"?"💥 Votre jeu agressif mérite une raquette qui ne freine pas votre puissance. Revenez régulièrement — de nouveaux modèles diamant arrivent chaque saison.":
               style==="controle"?"🎯 La précision évolue avec la technologie. Les nouvelles mousses EVA et textures spin skin font progresser le contrôle chaque année. Restez à la pointe.":
               "⚖️ L'équilibre parfait change avec votre progression. Votre setup d'aujourd'hui est idéal — mais dans 6 mois, votre jeu aura évolué. Revenez nous voir."}
            </p>
          </div>
          <button onClick={()=>{setPh("hero");setTimeout(()=>document.getElementById("attentional-feed")?.scrollIntoView({behavior:"smooth"}),100);}} style={{width:"100%",padding:"10px",background:"transparent",border:"1px solid rgba(232,168,56,0.25)",color:T.acc2,fontFamily:T.bf,fontSize:9,letterSpacing:"2px",textTransform:"uppercase",cursor:"pointer",transition:"all 0.3s"}} onMouseEnter={e=>{e.target.style.background="rgba(232,168,56,0.1)";}} onMouseLeave={e=>{e.target.style.background="transparent";}}>Explorer le catalogue intelligent</button>
        </div>

        <div style={{padding:"20px clamp(16px,4vw,32px) 12px"}}>
          <button style={{width:"100%",padding:"clamp(14px,2vw,18px)",background:T.acc2,color:T.black,border:"none",fontFamily:T.bf,fontSize:"clamp(10px,1.5vw,12px)",fontWeight:600,letterSpacing:"3px",textTransform:"uppercase",cursor:"pointer",transition:"background 0.3s"}} onMouseEnter={e=>e.target.style.background=T.acc} onMouseLeave={e=>e.target.style.background=T.acc2}>Tout ajouter — {total} €</button>
          <button onClick={reset} style={{width:"100%",marginTop:6,padding:"12px",background:"transparent",border:"1px solid rgba(255,255,255,0.08)",color:T.grey,fontFamily:T.bf,fontSize:9,letterSpacing:"2px",textTransform:"uppercase",cursor:"pointer"}}>Modifier mon profil</button>
        </div>
        <div style={{padding:"16px 20px",borderTop:"1px solid rgba(255,255,255,0.04)",textAlign:"center"}}><div style={{fontFamily:T.bf,fontSize:7,letterSpacing:"3px",textTransform:"uppercase",color:"rgba(255,255,255,0.25)"}}>Esprit Padel Shop · #1 en France · 600+ raquettes · Conseil expert</div></div>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
