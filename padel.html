/* ããã SOCIAL PROOF ããã */
function socialProof(id){
  let h=0;for(let i=0;i<id.length;i++){h=((h<<5)-h)+id.charCodeAt(i);h|=0;}
  const n=Math.abs(h%25)+72;
  const labels=["des joueurs","des compûˋtiteurs","des coachs","des clubs","des joueurs rûˋguliers"];
  return{pct:n,label:labels[Math.abs(h>>8)%labels.length]};
}

/* ããã SCORING ENGINE ããã
   Product vectors: [controle, puissance, maniabilite, tolerance, spin, confort, durabilite]

   Level profiles ã what matters most at each level
   Style profiles ã shifted by play style
   Position modifiers ã droite needs control, gauche needs power
   Frequency modifiers ã intensif needs durability
   Injury modifiers ã shifts toward comfort and lightweight
*/

const LEVEL_PROFILES={
  debutant:     [9,2,8,10,3,10,5],
  intermediaire:[7,5,7,7,6,7,7],
  avance:       [5,8,5,4,8,5,9],
  expert:       [4,9,4,3,9,4,10],
};
const STYLE_MOD={
  controle:  [4,-2,2,2,1,2,0],
  polyvalent:[1,1,1,1,1,1,1],
  puissance: [-2,5,-1,-2,2,-2,1],
};
const POS_MOD={
  droite:   [3,-1,1,2,1,1,0],
  gauche:   [-1,3,0,-1,1,-1,0],
  "les-deux":[1,1,1,1,1,1,0],
};
const FREQ_MOD={
  occasionnel:[0,0,0,1,0,1,-2],
  regulier:   [0,0,0,0,0,0,1],
  intensif:   [0,0,0,-1,0,-1,4],
};
const INJURY_MOD={
  aucune: [0,0,0,0,0,0,0],
  coude:  [2,-3,2,3,-1,5,0],
  epaule: [2,-2,3,2,0,4,0],
  genoux: [0,0,0,0,0,2,0], /* mainly affects shoe choice */
};

const LVL_PRICE={debutant:{max:180},intermediaire:{max:300},avance:{max:450},expert:{max:999}};

function buildProfile(level,style,position,freq,injury){
  const l=LEVEL_PROFILES[level]||LEVEL_PROFILES.intermediaire;
  const s=STYLE_MOD[style]||STYLE_MOD.polyvalent;
  const p=POS_MOD[position]||POS_MOD["les-deux"];
  const f=FREQ_MOD[freq]||FREQ_MOD.regulier;
  const inj=INJURY_MOD[injury]||INJURY_MOD.aucune;
  return l.map((v,i)=>v+(s[i]||0)+(p[i]||0)+(f[i]||0)+(inj[i]||0));
}

function scoreProduct(product,profile,level){
  const sc=product.sc;
  let score=0;
  for(let i=0;i<7;i++){
    if(sc[i]===0) continue; /* skip irrelevant axes (e.g. spin for shoes) */
    const diff=Math.abs(profile[i]-sc[i]);
    score+=(10-diff)*Math.max(0.5,profile[i]/5);
  }
  /* Level alignment bonus */
  if(product.level){
    const lvlOrder=["debutant","intermediaire","avance","expert"];
    const pLvl=lvlOrder.indexOf(product.level);
    const uLvl=lvlOrder.indexOf(level);
    const dist=Math.abs(pLvl-uLvl);
    if(dist===0) score+=8;
    else if(dist===1) score+=3;
    else score-=5;
  }
  return score;
}

function getRecs(level,style,position,freq,injury,gen,budgetMax){
  const g=gen||"h";
  const bMax=budgetMax||LVL_PRICE[level]?.max||400;
  const profile=buildProfile(level,style,position,freq,injury);

  /* Raquette recommendation */
  const raquettes=P.raquette
    .map(p=>({...p,_score:scoreProduct(p,profile,level)}))
    .sort((a,b)=>b._score-a._score);
  const raqInBudget=raquettes.filter(p=>p.price<=bMax);
  const raqPick=raqInBudget.length>0?raqInBudget[0]:raquettes[0];

  /* Chaussure recommendation */
  const chaussures=P.chaussure
    .map(p=>({...p,_score:scoreProduct(p,profile,level)}))
    .sort((a,b)=>b._score-a._score);
  const chPick=chaussures[0];

  /* Smart accessory picks based on profile */
  const accPicks=[];
  /* Always recommend balls */
  accPicks.push(P.accessoire.find(a=>a.type==="Balles"));
  /* Always recommend surgrip */
  accPicks.push(P.accessoire.find(a=>a.type==="Surgrip"));
  /* Regulier+ ã sac */
  if(["regulier","intensif"].includes(freq)){
    accPicks.push(P.accessoire.find(a=>a.type==="Sac"));
  }
  /* Occasionnel ã housse */
  if(freq==="occasionnel"){
    accPicks.push(P.accessoire.find(a=>a.type==="Housse"));
  }

  const categories=[
    {cat:"raquette",label:"RAQUETTE",name:"Votre arme",pick:raqPick},
    {cat:"chaussure",label:"CHAUSSURES",name:"Vos appuis",pick:chPick},
  ];

  const results=categories.map(c=>({
    ...c.pick,
    catLabel:c.label,
    catName:c.name,
    cat:c.cat,
    _matchPct:Math.round(Math.min(100,c.pick._score*1.2)),
  }));

  return{main:results,accessories:accPicks.filter(Boolean)};
}
